<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Mapa del Conocimiento — Física</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0f141c;
        color: #e0e0e0;
        font-family: 'Segoe UI', Arial, sans-serif;
        overflow: hidden;
      }
      #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background: #161d27;
        border-bottom: 1px solid #1f2933;
        height: 52px;
      }
      #header h1 { font-size: 17px; font-weight: 600; color: #90CAF9; }
      #header .subtitle { font-size: 11px; color: #78909C; margin-left: 12px; }
      #stats { font-size: 11px; color: #78909C; }
      #legend-bar {
        display: flex;
        gap: 14px;
        padding: 6px 20px;
        background: #131a24;
        border-bottom: 1px solid #1f2933;
        flex-wrap: wrap;
        overflow-x: auto;
      }
      .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #B0BEC5; white-space: nowrap; }
      .legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
      #main-container { display: flex; height: calc(100vh - 82px); }
      #nav-panel {
        width: 260px; min-width: 260px;
        background: #131a24;
        border-right: 1px solid #1f2933;
        display: flex; flex-direction: column;
        overflow: hidden;
      }
      #nav-panel.collapsed { width: 0; min-width: 0; border-right: none; }
      #nav-search {
        padding: 8px 10px;
        border-bottom: 1px solid #1f2933;
      }
      #nav-search input {
        width: 100%; padding: 6px 10px;
        background: #1a2332; border: 1px solid #2a3a4a; border-radius: 4px;
        color: #e0e0e0; font-size: 12px; outline: none;
      }
      #nav-search input::placeholder { color: #546E7A; }
      #nav-search input:focus { border-color: #42A5F5; }
      #nav-list {
        flex: 1; overflow-y: auto; padding: 4px 0;
      }
      #nav-list::-webkit-scrollbar { width: 5px; }
      #nav-list::-webkit-scrollbar-track { background: transparent; }
      #nav-list::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }
      .nav-group-header {
        padding: 6px 12px; font-size: 10px; font-weight: 600;
        color: #78909C; text-transform: uppercase; letter-spacing: 0.5px;
        background: #0f141c; position: sticky; top: 0; z-index: 1;
        display: flex; align-items: center; gap: 6px; cursor: pointer;
        user-select: none;
      }
      .nav-group-header:hover { color: #B0BEC5; }
      .nav-group-header .nav-dot {
        width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
      }
      .nav-group-header .nav-count {
        margin-left: auto; font-weight: 400; font-size: 9px; color: #546E7A;
      }
      .nav-group-header .chevron {
        font-size: 8px; transition: transform 0.15s;
      }
      .nav-group-header.collapsed .chevron { transform: rotate(-90deg); }
      .nav-group-items { padding: 0; }
      .nav-group-items.hidden { display: none; }
      .nav-item {
        padding: 4px 12px 4px 28px; font-size: 11px; color: #B0BEC5;
        cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        border-left: 2px solid transparent; transition: all 0.1s;
      }
      .nav-item:hover { background: #1a2332; color: #fff; border-left-color: #42A5F5; }
      .nav-item.active { background: #1e2a38; color: #90CAF9; border-left-color: #90CAF9; }
      .nav-item.filtered-out { display: none; }
      #mynetwork { flex: 1; height: 100%; }
      #controls {
        position: fixed; bottom: 16px; right: 16px; display: flex; gap: 8px; z-index: 10;
      }
      #controls button {
        padding: 6px 14px; border: 1px solid #37474F; border-radius: 4px;
        background: #1e2a38; color: #B0BEC5; font-size: 12px; cursor: pointer;
      }
      #controls button:hover { background: #263545; color: #fff; }
      #nav-toggle {
        position: fixed; bottom: 16px; left: 16px; z-index: 10;
        padding: 6px 14px; border: 1px solid #37474F; border-radius: 4px;
        background: #1e2a38; color: #B0BEC5; font-size: 12px; cursor: pointer;
      }
      #nav-toggle:hover { background: #263545; color: #fff; }
      #node-info {
        position: fixed; bottom: 50px; left: 16px; z-index: 10;
        max-width: 320px; padding: 10px 14px;
        background: #161d27; border: 1px solid #2a3a4a; border-radius: 6px;
        font-size: 11px; color: #B0BEC5; line-height: 1.5;
        display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      }
      #node-info b { color: #90CAF9; }
      #node-info .info-type { font-size: 9px; color: #546E7A; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <div id="header">
      <div style="display:flex;align-items:baseline;">
        <h1>Mapa del Conocimiento — Física</h1>
        <span class="subtitle" id="subtitle"></span>
      </div>
      <div id="stats"></div>
    </div>
    <div id="legend-bar">
      <div class="legend-item"><span class="legend-dot" style="background:#FFD700"></span>Raíz</div>
      <div class="legend-item"><span class="legend-dot" style="background:#42A5F5"></span>Área</div>
      <div class="legend-item"><span class="legend-dot" style="background:#26C6DA"></span>Sub-área</div>
      <div class="legend-item"><span class="legend-dot" style="background:#AB47BC"></span>Ecuación</div>
      <div class="legend-item"><span class="legend-dot" style="background:#66BB6A"></span>Resultado</div>
      <div class="legend-item"><span class="legend-dot" style="background:#FFA726"></span>Científico</div>
      <div class="legend-item"><span class="legend-dot" style="background:#EF5350"></span>Otra Ciencia</div>
      <div class="legend-item"><span class="legend-dot" style="background:#78909C"></span>Constante</div>
    </div>
    <div id="main-container">
      <div id="nav-panel">
        <div id="nav-search"><input type="text" id="search-input" placeholder="Buscar nodo..." /></div>
        <div id="nav-list"></div>
      </div>
      <div id="mynetwork"></div>
    </div>
    <div id="node-info"></div>
    <button id="nav-toggle" onclick="toggleNav()">Panel</button>
    <div id="controls">
      <button onclick="network.fit()">Fit</button>
      <button onclick="togglePhysics()">Toggle Physics</button>
    </div>

    <script>
      // ═══════════════════════════════════════════
      //  NODOS
      // ═══════════════════════════════════════════
      var nodes = new vis.DataSet([
        // ── RAÍZ ──
        {"id":"root","label":"Física","group":"Root","shape":"star","size":45,"title":"<b>Física</b><br>La ciencia fundamental que estudia la materia, la energía, el espacio y el tiempo."},

        // ── ÁREAS PRINCIPALES ──
        {"id":"mec","label":"Mecánica\nClásica","group":"Area","shape":"dot","size":30,"title":"<b>Mecánica Clásica</b><br>Estudio del movimiento de los cuerpos y las fuerzas que actúan sobre ellos.<br>Fundada por Newton (1687)."},
        {"id":"thermo","label":"Termodinámica","group":"Area","shape":"dot","size":30,"title":"<b>Termodinámica</b><br>Estudio del calor, la energía y las transformaciones entre ellas.<br>Gobernada por sus cuatro leyes."},
        {"id":"em","label":"Electro-\nmagnetismo","group":"Area","shape":"dot","size":30,"title":"<b>Electromagnetismo</b><br>Estudio de los campos eléctricos y magnéticos y su interacción con la materia.<br>Unificado por Maxwell (1865)."},
        {"id":"optics","label":"Óptica","group":"Area","shape":"dot","size":30,"title":"<b>Óptica</b><br>Estudio de la luz: su propagación, reflexión, refracción e interferencia."},
        {"id":"qm","label":"Mecánica\nCuántica","group":"Area","shape":"dot","size":30,"title":"<b>Mecánica Cuántica</b><br>Física del mundo subatómico: cuantización, probabilidad, dualidad onda-partícula.<br>Revolución 1900–1930."},
        {"id":"rel","label":"Relatividad","group":"Area","shape":"dot","size":30,"title":"<b>Relatividad</b><br>Teorías de Einstein: especial (1905) y general (1915).<br>Redefine espacio, tiempo y gravedad."},
        {"id":"nuc","label":"Física\nNuclear","group":"Area","shape":"dot","size":30,"title":"<b>Física Nuclear</b><br>Estudio de los núcleos atómicos: estructura, reacciones, fisión y fusión."},
        {"id":"part","label":"Física de\nPartículas","group":"Area","shape":"dot","size":30,"title":"<b>Física de Partículas</b><br>Estudio de los constituyentes fundamentales de la materia y sus interacciones.<br>Modelo Estándar."},
        {"id":"astro","label":"Astrofísica","group":"Area","shape":"dot","size":30,"title":"<b>Astrofísica</b><br>Física aplicada al cosmos: estrellas, galaxias, cosmología y el origen del universo."},
        {"id":"cond","label":"Materia\nCondensada","group":"Area","shape":"dot","size":30,"title":"<b>Materia Condensada</b><br>Física de sólidos y líquidos: semiconductores, superconductividad, magnetismo."},
        {"id":"statmech","label":"Mecánica\nEstadística","group":"Area","shape":"dot","size":30,"title":"<b>Mecánica Estadística</b><br>Puente entre lo microscópico y lo macroscópico usando probabilidad y estadística."},
        {"id":"fluids","label":"Dinámica\nde Fluidos","group":"Area","shape":"dot","size":30,"title":"<b>Dinámica de Fluidos</b><br>Estudio del movimiento de líquidos y gases: viscosidad, turbulencia, aerodinámica."},

        // ── SUB-ÁREAS ──
        // Mecánica
        {"id":"cinematica","label":"Cinemática","group":"Subarea","shape":"dot","size":20,"title":"<b>Cinemática</b><br>Descripción del movimiento sin considerar sus causas."},
        {"id":"dinamica","label":"Dinámica","group":"Subarea","shape":"dot","size":20,"title":"<b>Dinámica</b><br>Relación entre fuerzas y movimiento."},
        {"id":"estatica","label":"Estática","group":"Subarea","shape":"dot","size":20,"title":"<b>Estática</b><br>Equilibrio de cuerpos en reposo."},
        {"id":"lagrangiana","label":"Mecánica\nLagrangiana","group":"Subarea","shape":"dot","size":20,"title":"<b>Mecánica Lagrangiana</b><br>Formulación analítica usando el principio de mínima acción."},
        // Termodinámica
        {"id":"calorimetria","label":"Calorimetría","group":"Subarea","shape":"dot","size":20,"title":"<b>Calorimetría</b><br>Medición del calor en reacciones y procesos físicos."},
        {"id":"procesos_thermo","label":"Procesos\nTermodinámicos","group":"Subarea","shape":"dot","size":20,"title":"<b>Procesos Termodinámicos</b><br>Isotérmicos, adiabáticos, isobáricos, isocóricos."},
        {"id":"thermo_stat","label":"Termodinámica\nEstadística","group":"Subarea","shape":"dot","size":20,"title":"<b>Termodinámica Estadística</b><br>Fundamentación microscópica de la termodinámica."},
        // Electromagnetismo
        {"id":"electrostatica","label":"Electrostática","group":"Subarea","shape":"dot","size":20,"title":"<b>Electrostática</b><br>Cargas en reposo y campos eléctricos estáticos."},
        {"id":"magnetismo","label":"Magnetismo","group":"Subarea","shape":"dot","size":20,"title":"<b>Magnetismo</b><br>Campos magnéticos, imanes y corrientes."},
        {"id":"ondas_em","label":"Ondas EM","group":"Subarea","shape":"dot","size":20,"title":"<b>Ondas Electromagnéticas</b><br>Propagación de campos eléctricos y magnéticos acoplados."},
        {"id":"circuitos","label":"Circuitos","group":"Subarea","shape":"dot","size":20,"title":"<b>Circuitos Eléctricos</b><br>Análisis de corrientes, resistencias, capacitores e inductores."},
        // Óptica
        {"id":"optica_geo","label":"Óptica\nGeométrica","group":"Subarea","shape":"dot","size":20,"title":"<b>Óptica Geométrica</b><br>Rayos de luz, reflexión, refracción, lentes y espejos."},
        {"id":"optica_ond","label":"Óptica\nOndulatoria","group":"Subarea","shape":"dot","size":20,"title":"<b>Óptica Ondulatoria</b><br>Interferencia, difracción y polarización de la luz."},
        {"id":"optica_q","label":"Óptica\nCuántica","group":"Subarea","shape":"dot","size":20,"title":"<b>Óptica Cuántica</b><br>Interacción de fotones con la materia: emisión estimulada, coherencia."},
        // Mecánica Cuántica
        {"id":"mec_ond","label":"Mecánica\nOndulatoria","group":"Subarea","shape":"dot","size":20,"title":"<b>Mecánica Ondulatoria</b><br>Ecuación de Schrödinger y función de onda."},
        {"id":"mec_mat","label":"Mecánica\nMatricial","group":"Subarea","shape":"dot","size":20,"title":"<b>Mecánica Matricial</b><br>Formulación de Heisenberg con operadores matriciales."},
        {"id":"qft","label":"QFT","group":"Subarea","shape":"dot","size":20,"title":"<b>Teoría Cuántica de Campos (QFT)</b><br>Unión de mecánica cuántica y relatividad especial.<br>Fundamento del Modelo Estándar."},
        {"id":"entrelazamiento","label":"Entrelazamiento\nCuántico","group":"Subarea","shape":"dot","size":20,"title":"<b>Entrelazamiento Cuántico</b><br>Correlaciones no-locales entre partículas.<br>Base de la computación cuántica."},
        // Relatividad
        {"id":"rel_esp","label":"Relatividad\nEspecial","group":"Subarea","shape":"dot","size":20,"title":"<b>Relatividad Especial (1905)</b><br>Constancia de c, dilatación del tiempo, contracción de longitudes."},
        {"id":"rel_gen","label":"Relatividad\nGeneral","group":"Subarea","shape":"dot","size":20,"title":"<b>Relatividad General (1915)</b><br>Gravedad como curvatura del espacio-tiempo."},
        {"id":"cosmo_rel","label":"Cosmología\nRelativista","group":"Subarea","shape":"dot","size":20,"title":"<b>Cosmología Relativista</b><br>Modelos del universo basados en la ecuación de Einstein."},
        // Nuclear
        {"id":"fision","label":"Fisión","group":"Subarea","shape":"dot","size":20,"title":"<b>Fisión Nuclear</b><br>División de núcleos pesados liberando energía."},
        {"id":"fusion","label":"Fusión","group":"Subarea","shape":"dot","size":20,"title":"<b>Fusión Nuclear</b><br>Unión de núcleos ligeros: fuente de energía de las estrellas."},
        {"id":"radiactividad","label":"Radiactividad","group":"Subarea","shape":"dot","size":20,"title":"<b>Radiactividad</b><br>Desintegración espontánea de núcleos inestables (α, β, γ)."},
        // Partículas
        {"id":"modelo_std","label":"Modelo\nEstándar","group":"Subarea","shape":"dot","size":20,"title":"<b>Modelo Estándar</b><br>Teoría unificada de partículas: 17 partículas fundamentales, 3 fuerzas."},
        {"id":"qcd","label":"QCD","group":"Subarea","shape":"dot","size":20,"title":"<b>Cromodinámica Cuántica (QCD)</b><br>Teoría de la fuerza fuerte entre quarks y gluones."},
        {"id":"electrodebil","label":"Teoría\nElectrodébil","group":"Subarea","shape":"dot","size":20,"title":"<b>Teoría Electrodébil</b><br>Unificación de electromagnetismo y fuerza débil (Glashow-Weinberg-Salam)."},
        // Astrofísica
        {"id":"estelar","label":"Astrofísica\nEstelar","group":"Subarea","shape":"dot","size":20,"title":"<b>Astrofísica Estelar</b><br>Formación, evolución y muerte de estrellas."},
        {"id":"cosmologia","label":"Cosmología","group":"Subarea","shape":"dot","size":20,"title":"<b>Cosmología</b><br>Origen, estructura y destino del universo. Big Bang y energía oscura."},
        {"id":"altas_energias","label":"Astrofísica de\nAltas Energías","group":"Subarea","shape":"dot","size":20,"title":"<b>Astrofísica de Altas Energías</b><br>Rayos cósmicos, pulsares, GRBs, jets relativistas."},
        // Materia Condensada
        {"id":"supercon","label":"Superconductividad","group":"Subarea","shape":"dot","size":20,"title":"<b>Superconductividad</b><br>Resistencia eléctrica cero por debajo de temperatura crítica."},
        {"id":"semicond","label":"Semiconductores","group":"Subarea","shape":"dot","size":20,"title":"<b>Semiconductores</b><br>Materiales con conductividad controlable: base de la electrónica moderna."},
        {"id":"mag_solido","label":"Magnetismo de\nEstado Sólido","group":"Subarea","shape":"dot","size":20,"title":"<b>Magnetismo de Estado Sólido</b><br>Ferromagnetismo, antiferromagnetismo, espintrónica."},
        // Mecánica Estadística
        {"id":"distribuciones","label":"Distribuciones\nEstadísticas","group":"Subarea","shape":"dot","size":20,"title":"<b>Distribuciones Estadísticas</b><br>Maxwell-Boltzmann, Fermi-Dirac, Bose-Einstein."},
        {"id":"info_teoria","label":"Teoría de la\nInformación","group":"Subarea","shape":"dot","size":20,"title":"<b>Teoría de la Información</b><br>Entropía de Shannon, conexión con entropía termodinámica."},
        {"id":"trans_fase","label":"Transiciones\nde Fase","group":"Subarea","shape":"dot","size":20,"title":"<b>Transiciones de Fase</b><br>Cambios de estado, puntos críticos, universalidad."},
        // Fluidos
        {"id":"fluidos_ideales","label":"Fluidos\nIdeales","group":"Subarea","shape":"dot","size":20,"title":"<b>Fluidos Ideales</b><br>Incompresibles y sin viscosidad: ecuación de Euler."},
        {"id":"turbulencia","label":"Turbulencia","group":"Subarea","shape":"dot","size":20,"title":"<b>Turbulencia</b><br>Flujo caótico a altos números de Reynolds. Problema abierto del milenio."},
        {"id":"aerodinamica","label":"Aerodinámica","group":"Subarea","shape":"dot","size":20,"title":"<b>Aerodinámica</b><br>Fuerzas en cuerpos inmersos en flujo de aire: sustentación y arrastre."},

        // ── ECUACIONES ──
        // Mecánica
        {"id":"eq_newton2","label":"F = ma","group":"Equation","shape":"box","size":18,"title":"<b>Segunda Ley de Newton</b><br>La fuerza neta es igual a masa por aceleración.<br>Fundamento de toda la mecánica clásica.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_momentum","label":"p = mv","group":"Equation","shape":"box","size":18,"title":"<b>Momento Lineal</b><br>Cantidad de movimiento: producto de masa por velocidad.<br>Se conserva en sistemas aislados.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_lagrangian","label":"L = T − V","group":"Equation","shape":"box","size":18,"title":"<b>Lagrangiano</b><br>Diferencia entre energía cinética (T) y potencial (V).<br>Base de la mecánica analítica.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_ke","label":"E_k = ½mv²","group":"Equation","shape":"box","size":18,"title":"<b>Energía Cinética</b><br>Energía asociada al movimiento de un cuerpo.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_work","label":"W = F · d","group":"Equation","shape":"box","size":18,"title":"<b>Trabajo Mecánico</b><br>Producto escalar de fuerza por desplazamiento.","font":{"face":"Consolas, monospace"}},
        // Termodinámica
        {"id":"eq_entropy","label":"ΔS ≥ 0","group":"Equation","shape":"box","size":18,"title":"<b>Segunda Ley de la Termodinámica</b><br>La entropía de un sistema aislado nunca decrece.<br>Define la flecha del tiempo.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_gas","label":"PV = nRT","group":"Equation","shape":"box","size":18,"title":"<b>Ley de Gas Ideal</b><br>Relación entre presión, volumen, moles y temperatura.<br>Válida a bajas presiones y altas temperaturas.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_thermo1","label":"dU = δQ − δW","group":"Equation","shape":"box","size":18,"title":"<b>Primera Ley de la Termodinámica</b><br>Conservación de la energía: cambio de energía interna = calor - trabajo.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_carnot","label":"η = 1 − T_c/T_h","group":"Equation","shape":"box","size":18,"title":"<b>Eficiencia de Carnot</b><br>Máxima eficiencia teórica de un motor térmico.<br>Depende solo de las temperaturas.","font":{"face":"Consolas, monospace"}},
        // Electromagnetismo
        {"id":"eq_gauss","label":"∇·E = ρ/ε₀","group":"Equation","shape":"box","size":18,"title":"<b>Ley de Gauss</b><br>Primera ecuación de Maxwell.<br>Las cargas eléctricas son fuente del campo eléctrico.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_ampere","label":"∇×B = μ₀J + μ₀ε₀∂E/∂t","group":"Equation","shape":"box","size":18,"title":"<b>Ley de Ampère-Maxwell</b><br>Corrientes y campos eléctricos variables generan campos magnéticos.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_coulomb","label":"F = kq₁q₂/r²","group":"Equation","shape":"box","size":18,"title":"<b>Ley de Coulomb</b><br>Fuerza entre dos cargas puntuales: proporcional al producto, inversamente al cuadrado de la distancia.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_ohm","label":"V = IR","group":"Equation","shape":"box","size":18,"title":"<b>Ley de Ohm</b><br>El voltaje es proporcional a la corriente por la resistencia.","font":{"face":"Consolas, monospace"}},
        // Óptica
        {"id":"eq_snell","label":"n₁sinθ₁ = n₂sinθ₂","group":"Equation","shape":"box","size":18,"title":"<b>Ley de Snell</b><br>Relación entre ángulos de incidencia y refracción al cambiar de medio.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_planck_e","label":"E = hf","group":"Equation","shape":"box","size":18,"title":"<b>Relación de Planck-Einstein</b><br>La energía de un fotón es proporcional a su frecuencia.<br>Origen de la cuántica.","font":{"face":"Consolas, monospace"}},
        {"id":"eq_diffraction","label":"d sinθ = mλ","group":"Equation","shape":"box","size":18,"title":"<b>Ecuación de Difracción</b><br>Condición para máximos de difracción en una rendija.","font":{"face":"Consolas, monospace"}},

        {"from":"const_G","to":"rel_gen","color":"#78909C","width":1.0,"dashes":true,"title":"ecuación de Einstein"},
        {"from":"const_e","to":"em","color":"#78909C","width":1.0,"dashes":true,"title":"carga fundamental"},
        {"from":"const_e","to":"qm","color":"#78909C","width":1.0,"dashes":true,"title":"átomo de hidrógeno"},
        {"from":"const_eps0","to":"em","color":"#78909C","width":1.0,"dashes":true,"title":"ley de Gauss / Coulomb"},

        // ── ECUACIONES COMPARTIDAS ──
        {"from":"eq_emc2","to":"nuc","color":"#AB47BC","width":1.0,"dashes":true,"title":"equivalencia masa-energía en reacciones nucleares"},
        {"from":"eq_gravity","to":"mec","color":"#AB47BC","width":1.0,"dashes":true,"title":"gravitación newtoniana"},
        {"from":"eq_planck_e","to":"qm","color":"#AB47BC","width":1.0,"dashes":true,"title":"cuantización de la energía"},
        {"from":"eq_boltzmann_s","to":"thermo","color":"#AB47BC","width":1.0,"dashes":true,"title":"entropía termodinámica"},

        // ── RESULTADO → CIENTÍFICO (descubrimientos clave) ──
        {"from":"sci_einstein","to":"res_fotoelectrico","color":"#FFA726","width":1.0,"dashes":true,"title":"explicó (1905)"},
        {"from":"sci_einstein","to":"eq_emc2","color":"#FFA726","width":1.0,"dashes":true,"title":"derivó (1905)"},
        {"from":"sci_newton","to":"eq_gravity","color":"#FFA726","width":1.0,"dashes":true,"title":"descubrió (1687)"},
        {"from":"sci_maxwell","to":"res_unificacion_em","color":"#FFA726","width":1.0,"dashes":true,"title":"unificó (1865)"},
        {"from":"sci_planck","to":"res_planck_dist","color":"#FFA726","width":1.0,"dashes":true,"title":"derivó (1900)"},
        {"from":"sci_hubble","to":"res_expansion","color":"#FFA726","width":1.0,"dashes":true,"title":"descubrió (1929)"},
        {"from":"sci_hawking","to":"res_agujeros_negros","color":"#FFA726","width":1.0,"dashes":true,"title":"radiación de Hawking"},
        {"from":"sci_curie","to":"radiactividad","color":"#FFA726","width":1.0,"dashes":true,"title":"investigó"},
        {"from":"sci_bardeen","to":"res_transistor","color":"#FFA726","width":1.0,"dashes":true,"title":"co-inventó (1947)"},
        {"from":"sci_feynman","to":"qft","color":"#FFA726","width":1.0,"dashes":true,"title":"diagramas de Feynman"}
      ]);

      // ═══════════════════════════════════════════
      //  CONFIGURACIÓN
      // ═══════════════════════════════════════════
      // Fix edge colors: vis-network needs {color:X, highlight:X, hover:X} object
      var edgeItems = edges.get();
      edgeItems.forEach(function(e) {
        if (typeof e.color === 'string') {
          e.color = { color: e.color, highlight: e.color, hover: e.color };
        }
      });
      edges.clear();
      edges.add(edgeItems);

      var data = { nodes: nodes, edges: edges };
      var nCount = nodes.get().length;
      var eCount = edges.get().length;
      document.getElementById('subtitle').textContent = nCount + ' nodos · ' + eCount + ' aristas';

      var options = {
        nodes: {
          font: { color: '#E0E0E0', face: 'Segoe UI, Arial', size: 11 },
          borderWidth: 2,
        },
        edges: {
          smooth: { enabled: true, type: 'continuous', roundness: 0.3 },
          color: { inherit: false, opacity: 0.85 },
          font: { align: 'horizontal', size: 9, color: '#CFD8DC' },
          width: 1.2,
          arrows: { to: { enabled: true, scaleFactor: 0.6 } },
        },
        groups: {
          "Root":         {"color":{"background":"#FFD700","border":"#FFA000"}},
          "Area":         {"color":{"background":"#42A5F5","border":"#1565C0"}},
          "Subarea":      {"color":{"background":"#26C6DA","border":"#00838F"}},
          "Equation":     {"color":{"background":"#AB47BC","border":"#6A1B9A"}},
          "Result":       {"color":{"background":"#66BB6A","border":"#2E7D32"}},
          "Scientist":    {"color":{"background":"#FFA726","border":"#E65100"}},
          "OtherScience": {"color":{"background":"#EF5350","border":"#B71C1C"}},
          "Constant":     {"color":{"background":"#78909C","border":"#37474F"}}
        },
        physics: {
          enabled: true,
          barnesHut: {
            avoidOverlap: 0.5,
            centralGravity: 0.15,
            springLength: 220,
            springConstant: 0.006,
            damping: 0.12,
            gravitationalConstant: -10000,
          },
          stabilization: { iterations: 400, fit: true },
        },
        interaction: {
          hover: true,
          dragNodes: true,
          dragView: true,
          zoomView: true,
          tooltipDelay: 100,
        },
      };

      var container = document.getElementById('mynetwork');
      var network = new vis.Network(container, data, options);

      var physicsOn = true;
      function togglePhysics() {
        physicsOn = !physicsOn;
        network.setOptions({ physics: { enabled: physicsOn } });
      }

      network.on("stabilizationIterationsDone", function () {
        document.getElementById('stats').textContent = 'Estabilizado';
      });

      // ═══════════════════════════════════════════
      //  NAVEGACIÓN
      // ═══════════════════════════════════════════
      var groupMeta = {
        "Root":         { label: "Raíz",          color: "#FFD700" },
        "Area":         { label: "Áreas",         color: "#42A5F5" },
        "Subarea":      { label: "Sub-áreas",     color: "#26C6DA" },
        "Equation":     { label: "Ecuaciones",    color: "#AB47BC" },
        "Result":       { label: "Resultados",    color: "#66BB6A" },
        "Scientist":    { label: "Científicos",   color: "#FFA726" },
        "OtherScience": { label: "Otras Ciencias",color: "#EF5350" },
        "Constant":     { label: "Constantes",    color: "#78909C" }
      };
      var groupOrder = ["Root","Area","Subarea","Equation","Result","Scientist","OtherScience","Constant"];

      // Build nav list
      var navList = document.getElementById('nav-list');
      var allNodes = nodes.get();
      var grouped = {};
      allNodes.forEach(function(n) {
        var g = n.group || 'Other';
        if (!grouped[g]) grouped[g] = [];
        grouped[g].push(n);
      });

      groupOrder.forEach(function(g) {
        var items = grouped[g];
        if (!items || items.length === 0) return;
        var meta = groupMeta[g] || { label: g, color: '#78909C' };

        var header = document.createElement('div');
        header.className = 'nav-group-header';
        header.dataset.group = g;
        header.innerHTML = '<span class="chevron">▼</span>' +
          '<span class="nav-dot" style="background:' + meta.color + '"></span>' +
          meta.label +
          '<span class="nav-count">' + items.length + '</span>';

        var container = document.createElement('div');
        container.className = 'nav-group-items';
        container.dataset.group = g;

        items.sort(function(a, b) {
          return (a.label || '').replace(/\n/g,' ').localeCompare((b.label || '').replace(/\n/g,' '));
        });

        items.forEach(function(n) {
          var item = document.createElement('div');
          item.className = 'nav-item';
          item.dataset.id = n.id;
          item.textContent = (n.label || n.id).replace(/\n/g, ' ');
          item.addEventListener('click', function() { focusNode(n.id); });
          container.appendChild(item);
        });

        header.addEventListener('click', function() {
          header.classList.toggle('collapsed');
          container.classList.toggle('hidden');
        });

        navList.appendChild(header);
        navList.appendChild(container);
      });

      // Focus node
      var activeItem = null;
      function focusNode(nodeId) {
        network.focus(nodeId, { scale: 1.5, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
        network.selectNodes([nodeId]);

        if (activeItem) activeItem.classList.remove('active');
        var el = document.querySelector('.nav-item[data-id="' + nodeId + '"]');
        if (el) { el.classList.add('active'); activeItem = el; el.scrollIntoView({ block: 'nearest' }); }

        showNodeInfo(nodeId);
      }

      // Node info panel
      var infoPanel = document.getElementById('node-info');
      function showNodeInfo(nodeId) {
        var n = nodes.get(nodeId);
        if (!n) { infoPanel.style.display = 'none'; return; }
        var meta = groupMeta[n.group] || { label: n.group };
        var connected = network.getConnectedNodes(nodeId);
        var connLabels = connected.map(function(cid) {
          var cn = nodes.get(cid);
          return cn ? (cn.label || cn.id).replace(/\n/g,' ') : cid;
        }).slice(0, 8);

        infoPanel.innerHTML =
          '<div class="info-type">' + meta.label + '</div>' +
          '<b>' + (n.label || n.id).replace(/\n/g,' ') + '</b><br>' +
          '<span style="color:#546E7A">' + connected.length + ' conexiones</span>' +
          (connLabels.length > 0 ? '<br><span style="color:#78909C">→ ' + connLabels.join(', ') + (connected.length > 8 ? '...' : '') + '</span>' : '');
        infoPanel.style.display = 'block';
      }

      // Click on canvas node
      network.on('click', function(params) {
        if (params.nodes.length > 0) {
          focusNode(params.nodes[0]);
        } else {
          infoPanel.style.display = 'none';
          if (activeItem) { activeItem.classList.remove('active'); activeItem = null; }
        }
      });

      // Search
      var searchInput = document.getElementById('search-input');
      searchInput.addEventListener('input', function() {
        var q = this.value.toLowerCase().trim();
        var navItems = document.querySelectorAll('.nav-item');
        var groupCounts = {};
        navItems.forEach(function(item) {
          var text = item.textContent.toLowerCase();
          var match = !q || text.indexOf(q) !== -1;
          item.classList.toggle('filtered-out', !match);
          var g = item.closest('.nav-group-items').dataset.group;
          if (!groupCounts[g]) groupCounts[g] = 0;
          if (match) groupCounts[g]++;
        });
        // Auto-expand groups with matches, collapse empty
        document.querySelectorAll('.nav-group-header').forEach(function(h) {
          var g = h.dataset.group;
          var c = h.nextElementSibling;
          if (q) {
            if (groupCounts[g] > 0) { h.classList.remove('collapsed'); c.classList.remove('hidden'); }
            else { h.classList.add('collapsed'); c.classList.add('hidden'); }
          }
        });
      });

      // Toggle nav panel
      function toggleNav() {
        document.getElementById('nav-panel').classList.toggle('collapsed');
        setTimeout(function() { network.redraw(); }, 50);
      }

      // Keyboard: Escape clears selection
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          network.unselectAll();
          infoPanel.style.display = 'none';
          if (activeItem) { activeItem.classList.remove('active'); activeItem = null; }
          searchInput.value = '';
          searchInput.dispatchEvent(new Event('input'));
        }
        // Ctrl+F focuses search
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        }
      });
    </script>
  </body>
</html>
