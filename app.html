    // ═══════════════════════════════════════════════
    // Pipeline Orchestrator
    // ═══════════════════════════════════════════════

    async function runPipeline(notes, apiKey, fingerprint) {
      try {
        // ── STAGE 1: SCANNING ──
        setBootStage('SCANNING...', `${notes.length} NOTES LOADED`);
        await sleep(300); // brief pause so user sees it

        // ── STAGE 2: EMBEDDING ──
        const texts = notes.map(n => n.text.slice(0, 2000));
        const embeddings = await embedTexts(texts, apiKey, (done, total) => {
          setBootStage('EMBEDDING...', `${done}/${total}`);
        });

        // ── STAGE 3: COMPUTING TOPOLOGY ──
        setBootStage('COMPUTING TOPOLOGY...', 'CLUSTERING');
        await sleep(50);
        const k = Math.min(N_CLUSTERS, notes.length);
        const { labels: clusterLabels } = kmeans(embeddings, k);

        setBootStage('COMPUTING TOPOLOGY...', 'PCA');
        await sleep(50);
        const pcaCoords = pca3d(embeddings);

        setBootStage('COMPUTING TOPOLOGY...', 'CENTRALIZED LAYOUT');
        await sleep(50);
        const central = computeCentralizedLayout(embeddings, pcaCoords);

        setBootStage('COMPUTING TOPOLOGY...', 'DECENTRALIZED LAYOUT');
        await sleep(50);
        const decentral = computeDecentralizedLayout(embeddings, clusterLabels, k);

        setBootStage('COMPUTING TOPOLOGY...', 'UMAP');
        await sleep(50);
        const distrib = computeDistributedLayout(embeddings, K_NEIGHBORS);

        setBootStage('COMPUTING TOPOLOGY...', 'K-NN EDGES');
        await sleep(50);
        const distMatrix = cosineDistanceMatrix(embeddings);
        const edges = knnEdges(distMatrix, K_NEIGHBORS);

        // ── Compute topology-specific edge sets ──

        // Centralized: star from medoid to every other node
        const centralEdges = [];
        for (let i = 0; i < notes.length; i++) {
          if (i === central.medoidIdx) continue;
          centralEdges.push({
            source: central.medoidIdx,
            target: i,
            label_forward: 'radiates to',
            label_backward: 'orbits center',
            topology: 'central',
          });
        }

        // Decentralized: find cluster medoids, connect hub→members + hub↔hub
        const clusterMedoids = {};
        for (let c = 0; c < k; c++) {
          const members = [];
          for (let i = 0; i < notes.length; i++) {
            if (clusterLabels[i] === c) members.push(i);
          }
          if (members.length === 0) continue;
          // Find cluster medoid (closest to cluster centroid)
          const clusterEmbs = members.map(i => embeddings[i]);
          const centroid = meanVec(clusterEmbs);
          let bestIdx = members[0], bestDist = Infinity;
          for (const i of members) {
            const d = cosineDistance(embeddings[i], centroid);
            if (d < bestDist) { bestDist = d; bestIdx = i; }
          }
          clusterMedoids[c] = bestIdx;
        }

        const decentralEdges = [];
        // Hub → members
        for (let c = 0; c < k; c++) {
          const hub = clusterMedoids[c];
          if (hub === undefined) continue;
          for (let i = 0; i < notes.length; i++) {
            if (clusterLabels[i] === c && i !== hub) {
              decentralEdges.push({
                source: hub,
                target: i,
                label_forward: 'governs',
                label_backward: 'belongs to hub',
                topology: 'decentral',
              });
            }
          }
        }
        // Hub ↔ hub
        const hubs = Object.values(clusterMedoids);
        for (let a = 0; a < hubs.length; a++) {
          for (let b = a + 1; b < hubs.length; b++) {
            decentralEdges.push({
              source: hubs[a],
              target: hubs[b],
              label_forward: 'bridges to',
              label_backward: 'bridges to',
              topology: 'decentral',
            });
          }
        }

        // ── Build node data ──
        const graphNodes = notes.map((note, i) => ({
          id: note.id,
          filename: note.filename,
          name: note.filename.replace(/\.(md|txt)$/i, ''),
          text_preview: note.text.slice(0, 600),
          cluster_id: clusterLabels[i],
          x_central: central.x[i],
          y_central: central.y[i],
          z_central: central.z[i],
          x_decentral: decentral.x[i],
          y_decentral: decentral.y[i],
          z_decentral: decentral.z[i],
          x_distrib: distrib.x[i],
          y_distrib: distrib.y[i],
          z_distrib: distrib.z[i],
          is_medoid: i === central.medoidIdx ? 1 : 0,
          is_llm_center: 0,
          cluster_name: '',
        }));

        // Initialize graph with white/uncolored nodes (no annotations yet)
        setBootStage('COMPUTING TOPOLOGY...', 'INITIALIZING GRAPH');
        await sleep(50);
        initGraph(graphNodes, []);

        // ── STAGE 4: ANNOTATING ──
        setBootStage('ANNOTATING...', 'CENTER NOMINATION');
        const llmCenterIdx = await nominateCenter(notes, apiKey);
        graphNodes.forEach(n => {
          n.is_llm_center = n.id === llmCenterIdx ? 1 : 0;
        });

        setBootStage('ANNOTATING...', 'CLUSTER NAMES');
        const clusterNames = await nameClusters(notes, clusterLabels, k, apiKey);
        graphNodes.forEach(n => {
          n.cluster_name = clusterNames[n.cluster_id] || `Cluster ${n.cluster_id}`;
        });

        // Update graph with cluster colors and names (refresh node objects for LLM center decoration)
        updateGraphData(graphNodes, [], true);

        // Progressive edge labeling — batch in the pipeline for incremental reveal
        const labeledEdges = [];
        for (let i = 0; i < edges.length; i += EDGE_LABEL_BATCH) {
          const batchEdges = edges.slice(i, i + EDGE_LABEL_BATCH);
          const batchResult = await labelEdges(notes, batchEdges, apiKey);
          labeledEdges.push(...batchResult);
          setBootStage('ANNOTATING...', `EDGE LABELS ${Math.min(i + EDGE_LABEL_BATCH, edges.length)}/${edges.length}`);
          // Show progressive edges during labeling
          updateGraphData(graphNodes, [...centralEdges, ...decentralEdges, ...labeledEdges]);
        }

        // Store edge sets for readout counts; combine all for the graph
        edgeSets = { central: centralEdges, decentral: decentralEdges, distrib: labeledEdges };
        allNodes = graphNodes;
        const combined = [...centralEdges, ...decentralEdges, ...labeledEdges];
        updateGraphData(graphNodes, combined);
        // Show only edges for the active topology
        Graph.linkVisibility(link => link.topology === currentLayout);

        // ── STAGE 5: ONLINE ──
        buildLegend(clusterNames);
        buildClusterLabels(clusterNames);
        const activeEdges = edgeSets[currentLayout] || [];
        buildReadouts(notes.length, activeEdges.length);

        // Cache session to IndexedDB — whitelist serialization to avoid Three.js/d3 objects
        const NODE_SAVE_KEYS = [
          'id', 'filename', 'name', 'text_preview', 'cluster_id', 'cluster_name',
          'x_central', 'y_central', 'z_central',
          'x_decentral', 'y_decentral', 'z_decentral',
          'x_distrib', 'y_distrib', 'z_distrib',
          'is_medoid', 'is_llm_center',
        ];
        const serializableNodes = graphNodes.map(n => {
          const clean = {};
          for (const k of NODE_SAVE_KEYS) if (n[k] !== undefined) clean[k] = n[k];
          return clean;
        });
        const serializeEdges = arr => arr.map(e => ({
          source: typeof e.source === 'object' ? e.source.id : e.source,
          target: typeof e.target === 'object' ? e.target.id : e.target,
          label_forward: e.label_forward || '',
          label_backward: e.label_backward || '',
        }));
        try {
          await saveSession({
            graphNodes: serializableNodes,
            labeledEdges: serializeEdges(labeledEdges),
            centralEdges: serializeEdges(centralEdges),
            decentralEdges: serializeEdges(decentralEdges),
            clusterNames,
            nodeCount: notes.length,
            fingerprint: fingerprint || '',
          });
          console.log('Cache saved:', serializableNodes.length, 'nodes');
        } catch (cacheErr) {
          console.error('Cache save failed:', cacheErr);
          setBootStage(`SCOPE ONLINE // ${notes.length} NODES // CACHE SAVE FAILED`, cacheErr.message);
        }

        setBootStage(`SCOPE ONLINE // ${notes.length} NODES // ${labeledEdges.length} EDGES`, '');
        setTimeout(hideBootStatus, 2000);

      } catch (err) {
        setBootStage('ERROR', err.message);
        console.error('Pipeline error:', err);
      }
    }

    // ═══════════════════════════════════════════════
    // 3D Graph Rendering + Scope Overlays
    // ═══════════════════════════════════════════════

    let Graph;
    let bloomPass;
    let currentLayout = 'central';
    let hoverNode = null;
    let selectedNode = null;
    let adjacency = {};
    let neighborSets = {};
    let nodeById = {};
    let allNodes = [];
    let edgeSets = { central: [], decentral: [], distrib: [] };

    // ── Lookup builders ──

    function rebuildLookups(nodes, edges) {
      adjacency = {};
      neighborSets = {};
      nodeById = {};
      nodes.forEach(n => { nodeById[n.id] = n; });
      edges.forEach(e => {
        if (!adjacency[e.source]) adjacency[e.source] = [];
        if (!adjacency[e.target]) adjacency[e.target] = [];
        adjacency[e.source].push({ id: e.target, label: e.label_forward });
        adjacency[e.target].push({ id: e.source, label: e.label_backward });
        if (!neighborSets[e.source]) neighborSets[e.source] = new Set();
        if (!neighborSets[e.target]) neighborSets[e.target] = new Set();
        neighborSets[e.source].add(e.target);
        neighborSets[e.target].add(e.source);
      });
    }

    // ── Custom position force ──

    function createPositionForce(strength) {
      let forceNodes;
      function force(alpha) {
        forceNodes.forEach(node => {
          const lk = 'x_' + currentLayout;
          const tx = (node[lk] || 0) * SCALE;
          const ty = (node['y_' + currentLayout] || 0) * SCALE;
          const tz = (node['z_' + currentLayout] || 0) * SCALE;
          node.vx += (tx - node.x) * strength * alpha;
          node.vy += (ty - node.y) * strength * alpha;
          node.vz += (tz - node.z) * strength * alpha;
        });
      }
      force.initialize = function(n) { forceNodes = n; };
      force.strength = function(s) {
        if (s === undefined) return strength;
        strength = s;
        return force;
      };
      return force;
    }

    // ── Color / style helpers ──

    function darken(hex, amount) {
      const r = Math.max(0, Math.round(parseInt(hex.slice(1, 3), 16) * (1 - amount)));
      const g = Math.max(0, Math.round(parseInt(hex.slice(3, 5), 16) * (1 - amount)));
      const b = Math.max(0, Math.round(parseInt(hex.slice(5, 7), 16) * (1 - amount)));
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getNodeColor(node) {
      const color = CLUSTER_COLORS[node.cluster_id % CLUSTER_COLORS.length];
      if (hoverNode) {
        if (node === hoverNode) return '#ffffff';
        if (neighborSets[hoverNode.id]?.has(node.id)) return color;
        return darken(color, 0.3);
      }
      if (selectedNode) {
        if (node === selectedNode) return '#ffffff';
        if (neighborSets[selectedNode.id]?.has(node.id)) return color;
        return darken(color, 0.1);
      }
      return color;
    }

    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return `${(n >> 16) & 255},${(n >> 8) & 255},${n & 255}`;
    }

    function getLinkColor(link) {
      const rgb = hexToRgb(VFX.linkColor.val);
      const focus = hoverNode || selectedNode;
      if (focus) {
        const s = typeof link.source === 'object' ? link.source : nodeById[link.source];
        const t = typeof link.target === 'object' ? link.target : nodeById[link.target];
        if (s === focus || t === focus) {
          const alpha = hoverNode ? VFX.linkOpacityHover.val : Math.min(VFX.linkAlpha.val * 2.5, 1);
          return `rgba(${rgb},${alpha})`;
        }
        if (hoverNode) return `rgba(${rgb},0.02)`;
        return `rgba(${rgb},${VFX.linkAlpha.val * 0.9})`;
      }
      return `rgba(${rgb},${VFX.linkAlpha.val})`;
    }

    function getLinkWidth(link) {
      const focus = hoverNode || selectedNode;
      if (focus) {
        const s = typeof link.source === 'object' ? link.source : nodeById[link.source];
        const t = typeof link.target === 'object' ? link.target : nodeById[link.target];
        if (s === focus || t === focus) return hoverNode ? VFX.linkWidthHover.val : VFX.linkWidthVal.val * 1.5;
      }
      return VFX.linkWidthVal.val;
    }

    // ── Tooltip builders ──

    function buildNodeTooltip(node) {
      const markers = [];
      if (node.is_medoid) markers.push('<span style="color:#ef4444;font-size:10px;">MEDOID</span>');
      if (node.is_llm_center) markers.push('<span style="color:#fb923c;font-size:10px;">LLM.CENTER</span>');
      return `<div style="text-align:center;font-family:monospace;">`
        + `<div style="font-weight:600;">${escapeHtml(node.name)}</div>`
        + `<div style="color:#4a6a8a;font-size:11px;">${escapeHtml(node.cluster_name || '')}</div>`
        + (markers.length ? `<div style="margin-top:3px;">${markers.join(' ')}</div>` : '')
        + '</div>';
    }

    function buildLinkTooltip(link) {
      const s = typeof link.source === 'object' ? link.source : nodeById[link.source];
      const t = typeof link.target === 'object' ? link.target : nodeById[link.target];
      if (!s || !t) return '';
      return `<div style="max-width:300px;font-family:monospace;">`
        + `<div>${escapeHtml(s.name)} → ${escapeHtml(t.name)}</div>`
        + `<div style="color:#4a6a8a;font-style:italic;">${escapeHtml(link.label_forward || '')}</div>`
        + `<div style="margin-top:6px;">${escapeHtml(t.name)} → ${escapeHtml(s.name)}</div>`
        + `<div style="color:#4a6a8a;font-style:italic;">${escapeHtml(link.label_backward || '')}</div>`
        + '</div>';
    }

    // ── Interaction handlers ──

    function handleNodeHover(node) {
      hoverNode = node || null;
      document.getElementById('graph').style.cursor = node ? 'pointer' : '';
      if (Graph) {
        const { neighbors1, neighbors2 } = node
          ? getNeighborDepths(node)
          : { neighbors1: new Set(), neighbors2: new Set() };

        Graph.graphData().nodes.forEach(n => {
          if (hoverNode) {
            if (n === hoverNode)             updateNodeAppearance(n, 'hover');
            else if (neighbors1.has(n.id))   updateNodeAppearance(n, 'neighbor');
            else if (neighbors2.has(n.id))   updateNodeAppearance(n, 'neighbor2');
            else                             updateNodeAppearance(n, 'dim');
          } else if (selectedNode) {
            // Restore selection view: selected + neighbors highlighted
            const selN1 = neighborSets[selectedNode.id];
            if (n === selectedNode)          updateNodeAppearance(n, 'selected');
            else if (selN1?.has(n.id))       updateNodeAppearance(n, 'sel-neighbor');
            else                             updateNodeAppearance(n, 'sel-rest');
          } else {
            updateNodeAppearance(n, 'normal');
          }
        });
        Graph.linkColor(Graph.linkColor())
             .linkWidth(Graph.linkWidth());
      }
    }

    function handleNodeClick(node) {
      selectedNode = node;
      showDetailCard(node);

      // Selected node highlighted, neighbors slightly visible, rest normal
      const { neighbors1 } = getNeighborDepths(node);
      Graph.graphData().nodes.forEach(n => {
        if (n === node)                  updateNodeAppearance(n, 'selected');
        else if (neighbors1.has(n.id))   updateNodeAppearance(n, 'sel-neighbor');
        else                             updateNodeAppearance(n, 'sel-rest');
      });

      Graph.linkColor(Graph.linkColor())
           .linkWidth(Graph.linkWidth());

      // Focus camera: approach from current direction, stop 700 units from node
      const distance = 700;
      const cam = Graph.camera();
      const dx = cam.position.x - node.x;
      const dy = cam.position.y - node.y;
      const dz = cam.position.z - node.z;
      const curDist = Math.hypot(dx, dy, dz) || 1;
      const s = distance / curDist;
      Graph.cameraPosition(
        { x: node.x + dx * s, y: node.y + dy * s, z: node.z + dz * s },
        node,
        1000
      );

      // After animation completes: shift orbit target right so node centers in
      // the space left of the panel using world-space units per pixel
      const panelWidth = parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue('--panel-width') || '360'
      );
      setTimeout(() => {
        if (!Graph || !selectedNode) return;
        const camera = Graph.camera();
        const controls = Graph.controls();
        const fov = camera.fov * Math.PI / 180;
        const worldPerPx = 2 * distance * Math.tan(fov / 2) / window.innerHeight;
        const rightShift = (panelWidth / 2) * worldPerPx;
        const right = new THREE.Vector3();
        right.crossVectors(
          camera.getWorldDirection(new THREE.Vector3()),
          camera.up
        ).normalize();
        controls.target.addScaledVector(right, rightShift);
        controls.update();
      }, 1300);
    }

    function handleBackgroundClick() {
      hideDetailCard();
    }

    // ── Side panel functions ──

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\s*([\s\S]*)$/);
      if (!match) return { meta: null, body: text };

      const meta = {};
      let currentKey = null;
      for (const line of match[1].split('\n')) {
        const kvMatch = line.match(/^(\w[\w\s-]*):\s*(.*)$/);
        if (kvMatch) {
          currentKey = kvMatch[1].trim();
          const val = kvMatch[2].trim();
          if (val.startsWith('[') || val === '') {
            meta[currentKey] = val === '' ? '' : val;
          } else {
            meta[currentKey] = val;
          }
        } else if (currentKey && line.match(/^\s*-\s+/)) {
          // YAML list continuation
          const item = line.replace(/^\s*-\s+/, '').trim().replace(/^["']|["']$/g, '');
          const prev = meta[currentKey];
          meta[currentKey] = prev ? prev + ', ' + item : item;
        }
      }
      return { meta, body: match[2].trim() };
    }

    function renderMeta(meta) {
      if (!meta) return '';
      const skip = new Set(['cssclasses', 'tags']);
      let html = '';
      for (const [key, val] of Object.entries(meta)) {
        if (skip.has(key.toLowerCase()) || !val) continue;
        let rendered = escapeHtml(String(val)).replace(/\[\[([^\]]+)\]\]/g, '$1');
        // Auto-link URLs
        rendered = rendered.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">link</a>');
        html += `<div class="meta-row"><span class="meta-key">${escapeHtml(key)}:</span><span class="meta-val">${rendered}</span></div>`;
      }
      return html;
    }

    function showDetailCard(node) {
      const card = document.getElementById('detail-card');
      const resize = document.getElementById('panel-resize');

      // Title
      let title = escapeHtml(node.name);
      if (node.is_medoid) title += ' <span class="marker medoid">MEDOID</span>';
      if (node.is_llm_center) title += ' <span class="marker llm-center">LLM.CENTER</span>';
      document.getElementById('card-title').innerHTML = title;

      // Cluster
      const color = CLUSTER_COLORS[node.cluster_id % CLUSTER_COLORS.length];
      document.getElementById('card-cluster').innerHTML =
        `<span class="cluster-badge" style="border-color:${color};color:${color};">${escapeHtml(node.cluster_name)}</span>`;

      // Parse frontmatter and body
      const { meta, body } = parseFrontmatter(node.text_preview || '');

      // Metadata
      document.getElementById('card-meta').innerHTML = renderMeta(meta);

      // Body preview
      document.getElementById('card-preview').textContent = body || '(no content)';

      // Connections
      const edges = adjacency[node.id] || [];
      let html = `<div class="conn-header">CONNECTIONS (${edges.length})</div>`;
      edges.forEach(e => {
        const target = nodeById[e.id];
        if (!target) return;
        html += `<div class="conn-item"><div class="conn-edge"><span class="arrow">── </span><span class="label">${escapeHtml(e.label)}</span><span class="arrow"> ──▸</span></div><div class="conn-name" data-node-id="${target.id}">${escapeHtml(target.name)}</div></div>`;
      });
      document.getElementById('card-connections').innerHTML = html;

      card.classList.add('visible');
      resize.style.display = 'block';
      updateResizePosition();
    }

    function hideDetailCard() {
      document.getElementById('detail-card').classList.remove('visible');
      document.getElementById('panel-resize').style.display = 'none';
      selectedNode = null;
      // Clear selection highlighting
      if (Graph) {
        // updateNodeAppearance('normal') already clears all state classes
        Graph.graphData().nodes.forEach(n => updateNodeAppearance(n, 'normal'));
        Graph.linkOpacity(1.0);
        Graph.linkColor(Graph.linkColor())
             .linkWidth(Graph.linkWidth())
             .linkDirectionalParticles(VFX.particleCount.val);
      }
    }

    // ── Panel resize ──

    function updateResizePosition() {
      const card = document.getElementById('detail-card');
      const resize = document.getElementById('panel-resize');
      const width = card.getBoundingClientRect().width;
      resize.style.right = (width - 2) + 'px';
    }

    (function initPanelResize() {
      const resize = document.getElementById('panel-resize');
      const card = document.getElementById('detail-card');
      let startX, startWidth;

      resize.addEventListener('mousedown', e => {
        e.preventDefault();
        startX = e.clientX;
        startWidth = card.getBoundingClientRect().width;
        resize.classList.add('dragging');
        card.style.transition = 'none';

        function onMove(e) {
          const delta = startX - e.clientX;
          const newWidth = Math.max(280, Math.min(startWidth + delta, window.innerWidth * 0.6));
          document.documentElement.style.setProperty('--panel-width', newWidth + 'px');
          resize.style.right = (newWidth - 2) + 'px';
        }

        function onUp() {
          resize.classList.remove('dragging');
          card.style.transition = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    })();

    // Close button and Escape key listeners
    document.getElementById('card-close').addEventListener('click', hideDetailCard);

    // Connection name click — navigate to that node
    document.getElementById('card-connections').addEventListener('click', e => {
      const nameEl = e.target.closest('.conn-name');
      if (!nameEl) return;
      const id = parseInt(nameEl.dataset.nodeId);
      const node = nodeById[id];
      if (!node) return;
      handleNodeClick(node);
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') hideDetailCard();
      if (e.key === 'h' && Graph) {
        Graph.cameraPosition({ x: 0, y: 0, z: SCALE * 2.5 }, { x: 0, y: 0, z: 0 }, 1000);
      }
    });

    // ── initGraph ──

    function initGraph(nodes, edges) {
      const links = edges.map(e => ({
        source: e.source,
        target: e.target,
        label_forward: e.label_forward,
        label_backward: e.label_backward,
        topology: e.topology,
      }));

      // Build neighbor lookups for only the active topology's edges
      const activeEdges = edges.filter(e => e.topology === currentLayout);
      rebuildLookups(nodes, activeEdges);

      Graph = ForceGraph3D()
        (document.getElementById('graph'))
        .graphData({ nodes, links })
        .backgroundColor(`rgba(${hexToRgb(VFX.bgColor.val)},${VFX.bgAlpha.val})`)
        .showNavInfo(false)
        .warmupTicks(60)
        .cooldownTicks(Infinity)
        .nodeThreeObject(node => createNodeObject(node))
        .nodeThreeObjectExtend(false)
        .nodeLabel(node => buildNodeTooltip(node))
        .linkColor(link => getLinkColor(link))
        .linkWidth(link => getLinkWidth(link))
        .linkOpacity(1.0)
        .linkHoverPrecision(VFX.linkHoverPrec.val)
        .linkLabel(link => buildLinkTooltip(link))
        .linkDirectionalParticles(VFX.particleCount.val)
        .linkDirectionalParticleWidth(VFX.particleWidth.val)
        .linkDirectionalParticleSpeed(VFX.particleSpeed.val)
        .linkDirectionalParticleColor(() => `rgba(${hexToRgb(VFX.particleColor.val)},${VFX.particleAlpha.val})`)
        .linkCurvature(VFX.linkCurvatureVal.val)
        .linkVisibility(link => link.topology === currentLayout)
        .onNodeClick(handleNodeClick)
        .onNodeHover(handleNodeHover)
        .onBackgroundClick(handleBackgroundClick);

      // Custom position force
      Graph
        .d3Force('position', createPositionForce(0.18))
        .d3Force('center', null);
      Graph.d3Force('link').strength(0.008).distance(100);
      Graph.d3Force('charge').strength(-25);

      // CSS2D overlay for constant-size node labels
      const graphEl = document.getElementById('graph');
      const css2d = new CSS2DRenderer();
      css2d.setSize(graphEl.clientWidth, graphEl.clientHeight);
      css2d.domElement.style.position = 'absolute';
      css2d.domElement.style.top = '0';
      css2d.domElement.style.left = '0';
      css2d.domElement.style.pointerEvents = 'none';
      graphEl.appendChild(css2d.domElement);

      // Render CSS2D labels on every frame
      (function renderLabels() {
        if (Graph) css2d.render(Graph.scene(), Graph.camera());
        requestAnimationFrame(renderLabels);
      })();

      // Resize graph + CSS2D overlay when window changes
      window.addEventListener('resize', () => {
        const w = window.innerWidth, h = window.innerHeight;
        Graph.width(w).height(h);
        css2d.setSize(w, h);
      });

      // Post-processing bloom
      const renderer = Graph.renderer();
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(Graph.scene(), Graph.camera()));
      bloomPass = new UnrealBloomPass(
        new THREE.Vector2(graphEl.clientWidth, graphEl.clientHeight),
        VFX.bloomStrength.val,
        VFX.bloomRadius.val,
        VFX.bloomThreshold.val
      );
      composer.addPass(bloomPass);
      Graph.postProcessingComposer(composer);

      // Set initial camera to the "H" recenter position
      Graph.cameraPosition({ x: 0, y: 0, z: SCALE * 2.5 }, { x: 0, y: 0, z: 0 });
    }

    // ── updateGraphData ──

    function updateGraphData(nodes, edges, refreshNodeObjects = false) {
      if (!Graph) return;
      const activeEdges = edges.filter(e => e.topology === currentLayout);
      rebuildLookups(nodes, activeEdges);
      const links = edges.map(e => ({
        source: e.source,
        target: e.target,
        label_forward: e.label_forward,
        label_backward: e.label_backward,
        topology: e.topology,
      }));
      Graph.graphData({ nodes, links });
      if (refreshNodeObjects) {
        Graph.nodeThreeObject(node => createNodeObject(node));
      }
    }

    // ── Topology switching ──

    const LAYOUT_DESCRIPTIONS = {
      central: 'SPHERICAL \u2014 MEDOID AT ORIGIN, NOTES RADIATE OUTWARD',
      decentral: 'FIBONACCI SPHERE \u2014 CLUSTER HUBS WITH ORBITING NOTES',
      distrib: 'UMAP 3D \u2014 SEMANTIC SIMILARITY DRIVES PROXIMITY',
    };

    document.querySelectorAll('#controls button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLayout = btn.dataset.layout;
        document.getElementById('layout-desc').textContent = LAYOUT_DESCRIPTIONS[currentLayout] || '';
        if (Graph && allNodes.length) {
          const activeEdges = edgeSets[currentLayout] || [];
          // Swap visible edges without calling graphData (which resets simulation)
          Graph.linkVisibility(link => link.topology === currentLayout);
          rebuildLookups(allNodes, activeEdges);
          buildReadouts(allNodes.length, activeEdges.length);
          // Soften position force, reheat, then restore — smooth ~2s drift
          const posForce = Graph.d3Force('position');
          posForce.strength(0.03);
          Graph.d3ReheatSimulation();
          setTimeout(() => posForce.strength(0.18), 3000);
        }
      });
    });

    // Set initial layout description
    document.getElementById('layout-desc').textContent = LAYOUT_DESCRIPTIONS.central;

    // ── Legend, Cluster Labels ──

    function buildLegend(clusterNames) {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';

      Object.entries(clusterNames).forEach(([id, name]) => {
        const color = CLUSTER_COLORS[id % CLUSTER_COLORS.length];
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-dot" data-cluster-dot="${id}" style="background:${color};"></div>`
          + `<span class="legend-label">${escapeHtml(name)}</span>`;
        legend.appendChild(item);
      });

      // Special markers
      const special = document.createElement('div');
      special.className = 'legend-special';
      special.innerHTML =
        '<div class="legend-item"><div class="legend-dot" style="border:2px solid #ef4444;background:transparent;"></div><span class="legend-label">EMBEDDING MEDOID</span></div>'
        + '<div class="legend-item"><div class="legend-dot" style="border:2px solid #fb923c;background:transparent;"></div><span class="legend-label">LLM-NOMINATED CENTER</span></div>';
      legend.appendChild(special);

    let clusterLabelEls = {};
    let clusterLabelRAF = null;

    function buildClusterLabels(clusterNames) {
      const container = document.getElementById('cluster-labels');
      container.innerHTML = '';
      clusterLabelEls = {};

      // Cancel existing loop before starting a new one
      if (clusterLabelRAF) {
        cancelAnimationFrame(clusterLabelRAF);
        clusterLabelRAF = null;
      }

      Object.entries(clusterNames).forEach(([id, name]) => {
        const el = document.createElement('div');
        el.className = 'cluster-label';
        el.textContent = name;
        el.style.color = CLUSTER_COLORS[id % CLUSTER_COLORS.length];
        el.style.opacity = '0';
        container.appendChild(el);
        clusterLabelEls[id] = el;
      });

      clusterLabelRAF = requestAnimationFrame(updateClusterLabelPositions);
    }

    function updateClusterLabelPositions() {
      clusterLabelRAF = requestAnimationFrame(updateClusterLabelPositions);
      if (!Graph) return;
      const show = currentLayout === 'decentral';
      const nodes = Graph.graphData().nodes;

      const centers = {};
      const counts = {};
      nodes.forEach(node => {
        const c = node.cluster_id;
        if (!centers[c]) { centers[c] = { x: 0, y: 0, z: 0 }; counts[c] = 0; }
        centers[c].x += node.x;
        centers[c].y += node.y;
        centers[c].z += node.z;
        counts[c]++;
      });

      Object.entries(clusterLabelEls).forEach(([id, el]) => {
        if (!show) { el.style.opacity = '0'; return; }
        const c = centers[id];
        const n = counts[id];
        if (!c || !n) return;
        const screen = Graph.graph2ScreenCoords(c.x / n, c.y / n, c.z / n);
        el.style.left = screen.x + 'px';
        el.style.top = screen.y + 'px';
        el.style.opacity = '1';
      });
    }

    function buildConfigPanel() {
      const panel = document.getElementById('config-panel');
      const sections = {};

      for (const [key, cfg] of Object.entries(VFX)) {
        if (!sections[cfg.section]) sections[cfg.section] = [];
        sections[cfg.section].push({ key, ...cfg });
      }

      let html = '';
      for (const [section, items] of Object.entries(sections)) {
        html += `<div class="config-section">`;
        html += `<div class="config-section-title">${section}</div>`;
        for (const item of items) {
          html += `<div class="config-row">`;
          html += `<span class="config-label">${item.label}</span>`;
          if (item.type === 'color') {
            html += `<input type="color" class="config-color" data-key="${item.key}" value="${item.val}">`;
            html += `<span class="config-hex" data-vfx="${item.key}">${item.val}</span>`;
          } else {
            const dec = item.step < 0.01 ? 3 : item.step < 1 ? 2 : 0;
            html += `<input type="range" class="config-slider" data-key="${item.key}" `;
            html += `min="${item.min}" max="${item.max}" step="${item.step}" value="${item.val}">`;
            html += `<span class="config-value" data-vfx="${item.key}">${Number(item.val).toFixed(dec)}</span>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }

      panel.innerHTML = html;

      function doRefresh(refresh) {
        if (refresh === 'nodes') scheduleNodeRefresh();
        else if (refresh === 'scale') refreshNodeScales();
        else if (refresh === 'links') refreshLinks();
        else if (refresh === 'colors') refreshColors();
        else if (refresh === 'clusters') refreshClusters();
        else if (refresh === 'postfx') refreshPostFx();
        else if (refresh === 'chrome') refreshChrome();
      }

      // Wire slider events
      panel.querySelectorAll('.config-slider').forEach(slider => {
        slider.addEventListener('input', e => {
          const key = e.target.dataset.key;
          const val = parseFloat(e.target.value);
          VFX[key].val = val;
          const dec = VFX[key].step < 0.01 ? 3 : VFX[key].step < 1 ? 2 : 0;
          panel.querySelector(`[data-vfx="${key}"]`).textContent = val.toFixed(dec);
          doRefresh(VFX[key].refresh);
        });
      });

      // Wire color picker events
      panel.querySelectorAll('.config-color').forEach(picker => {
        picker.addEventListener('input', e => {
          const key = e.target.dataset.key;
          VFX[key].val = e.target.value;
          panel.querySelector(`[data-vfx="${key}"]`).textContent = e.target.value;
          doRefresh(VFX[key].refresh);
        });
      });
    }

    let obStep = 0;

    // Mock graph data
    const OB_MOCK_NODES = [
      { id:'m0', name:'Idea Central',  fx:   0, fy:  0, fz:  0 },
      { id:'m1', name:'Concepto A',    fx: 160, fy: 80, fz: 60 },
      { id:'m2', name:'Concepto B',    fx:-140, fy: 60, fz:-80 },
      { id:'m3', name:'Concepto C',    fx:  80, fy:-100,fz: 120 },
      { id:'m4', name:'Relación X',    fx: -80, fy:-80, fz:-120 },
      { id:'m5', name:'Contexto',      fx:  20, fy:160, fz: -60 },
    ];
    const OB_MOCK_LINKS = [
      {source:'m0',target:'m1'}, {source:'m0',target:'m2'},
      {source:'m0',target:'m3'}, {source:'m1',target:'m4'},
      {source:'m2',target:'m5'}, {source:'m3',target:'m5'},
    ];

    // Onboarding camera state
    let ob_camPhi = 0, ob_camTheta = Math.PI/2, ob_camR = 500;
    let ob_prevX = null, ob_prevY = null;
    let ob_hoverNode = null;
    let ob_twoHandPrevDist = null;
    let ob_fistFrames = 0;
    const OB_FIST_FRAMES = 30;

    // Step 0 (palm): accumulate total rotation before advancing
    let ob_palmTotal = 0;
    const OB_PALM_THRESHOLD = 1.5; // radians of total rotation needed

    // Step 1 (point): hysteresis + hold-to-select like real graph
    let ob_candidateNode   = null;
    let ob_candidateFrames = 0;
    const OB_HOVER_FRAMES  = 5;   // frames to commit hover
    let ob_pointFrames     = 0;
    const OB_CLICK_FRAMES  = 45;  // hold ~0.75s to "select" node

    // Step 2 (zoom): accumulate real zoom delta
    let ob_zoomTotal = 0;
    const OB_ZOOM_THRESHOLD = 0.6; // total accumulated |log(ratio)| — requires noticeable zoom
    let ob_zoomCooldown = 0;       // post-zoom cooldown for onboarding gesture detection

    function ob_updateCamera() {
      if (!ObGraph) return;
      const sinT = Math.sin(ob_camTheta), cosT = Math.cos(ob_camTheta);
      const sinP = Math.sin(ob_camPhi),   cosP = Math.cos(ob_camPhi);
      ObGraph.cameraPosition(
        { x: ob_camR*sinT*sinP, y: ob_camR*cosT, z: ob_camR*sinT*cosP },
        { x:0, y:0, z:0 }, 0
      );
    }

    function createObGraph() {
      ObGraph = ForceGraph3D()
        (document.getElementById('ob-graph'))
        .graphData({ nodes: OB_MOCK_NODES, links: OB_MOCK_LINKS })
        .nodeLabel('name')
        .nodeColor(() => '#cd6d13')
        .nodeVal(8)
        .linkColor(() => 'rgba(205,109,19,0.4)')
        .linkWidth(1)
        .backgroundColor('#0a0a0f')
        .width(window.innerWidth)
        .height(window.innerHeight);
      ob_camR = 500; ob_camPhi = 0; ob_camTheta = Math.PI / 2;
      ob_updateCamera();
      // Disable mouse/trackpad orbit — hand tracking only
      ObGraph.controls().enabled = false;
    }

    let ob_interactionEnabled = false;

    function showObSplash(stepIdx, onReady) {
      const step = OB_STEPS[stepIdx];
      const splash = document.getElementById('ob-splash');
      const hud = document.getElementById('ob-hud');
      document.getElementById('ob-splash-icon').textContent = step.icon;
      document.getElementById('ob-splash-verb').textContent = step.verb;
      document.getElementById('ob-splash-desc').textContent = step.desc;
      document.getElementById('ob-splash-hand').innerHTML = OB_HAND_SVG[step.id] || '';
      splash.classList.remove('ob-splash--hidden');
      hud.style.opacity = '0';
      ob_interactionEnabled = false;
      const duration = (step.id === 'point') ? 2000 : 3000;
      setTimeout(() => {
        splash.classList.add('ob-splash--hidden');
        setTimeout(() => {
          hud.style.opacity = '1';
          ob_interactionEnabled = true;
          if (onReady) onReady();
        }, 600);
      }, duration);
    }

    function updateObHUD() {
      const step = OB_STEPS[obStep];
      document.getElementById('ob-step-counter').textContent = (obStep + 1) + ' / ' + OB_STEPS.length;
      document.getElementById('ob-icon').textContent = step.icon;
      document.getElementById('ob-verb').textContent = step.verb;
      document.getElementById('ob-desc').textContent = step.desc;
      document.getElementById('ob-hand-icon').innerHTML = OB_HAND_SVG[step.id] || '';
      document.getElementById('ob-feedback').textContent = '';
      document.getElementById('ob-hud').classList.remove('ob-hud--success');
      // Update dots
      document.querySelectorAll('.ob-dot').forEach(dot => {
        const i = parseInt(dot.dataset.i);
        dot.classList.remove('ob-dot--active', 'ob-dot--done');
        if (i < obStep) dot.classList.add('ob-dot--done');
        else if (i === obStep) dot.classList.add('ob-dot--active');
      });
    }

    function advanceObStep() {
      if (ob_stepLocked) return;
      ob_stepLocked = true;
      ob_interactionEnabled = false;
      document.getElementById('ob-feedback').textContent = '✓ GESTO DETECTADO';
      document.getElementById('ob-hud').classList.add('ob-hud--success');
      document.querySelector(`.ob-dot[data-i="${obStep}"]`).classList.add('ob-dot--done');
      setTimeout(() => {
        obStep++;
        if (obStep >= OB_STEPS.length) {
          completeOnboarding();
        } else {
          updateObHUD();
          ob_palmTotal = 0; ob_prevX = null; ob_prevY = null;
          ob_hoverNode = null; ob_candidateNode = null; ob_candidateFrames = 0;
          ob_pointFrames = 0;
          ob_zoomTotal = 0; ob_twoHandPrevDist = null; ob_zoomCooldown = 0;
          ob_fistFrames = 0;
          showObSplash(obStep, () => { ob_stepLocked = false; });
        }
      }, 900);
    }

    function completeOnboarding() {
      const ob = document.getElementById('onboarding');
      ob.style.transition = 'opacity 0.8s';
      ob.style.opacity = '0';
      setTimeout(() => {
        ob.classList.add('hidden');
        if (ObGraph) { if (ObGraph._destructor) ObGraph._destructor(); ObGraph = null; }
        ht_camR = SCALE * 2.5; ht_camPhi = 0; ht_camTheta = Math.PI / 2;
        ht_updateCamera();
        appState = 'ready';
      }, 800);
    }

    document.getElementById('ob-skip').addEventListener('click', () => completeOnboarding());

    function startOnboarding() {
      document.getElementById('onboarding').classList.remove('hidden');
      createObGraph();
      updateObHUD();
      showObSplash(0);
    }

    function handleOnboardingFrame(results, hands, lm, gesture, px, py) {
      if (!ob_interactionEnabled) return;
      const fbEl = document.getElementById('ob-feedback');

      // ── Step 0 — palm: orbit mock graph, accumulate real rotation ──────
      if (obStep === 0) {
        if (gesture === 'palm') {
          if (ob_prevX !== null) {
            const dx = px - ob_prevX;
            const dy = py - ob_prevY;
            ob_camPhi   -= dx * 3.5;
            ob_camTheta -= dy * 2.0;
            ob_camTheta  = Math.max(0.1, Math.min(Math.PI - 0.1, ob_camTheta));
            ob_updateCamera();
            ob_palmTotal += Math.abs(dx * 3.5) + Math.abs(dy * 2.0);
            const pct = Math.min(1, ob_palmTotal / OB_PALM_THRESHOLD);
            fbEl.textContent = 'ROTANDO [' + Math.round(pct * 100) + '%]';
            if (ob_palmTotal >= OB_PALM_THRESHOLD) advanceObStep();
          }
          ob_prevX = px; ob_prevY = py;
        } else {
          ob_prevX = null; ob_prevY = null;
        }
        return;
      }

      // ── Step 1 — point: hover + hold to select (with hysteresis) ──────
      if (obStep === 1) {
        if (gesture === 'point' && ObGraph) {
          const fx = 1 - lm[8].x;
          const fy = lm[8].y;
          const sx = fx * window.innerWidth;
          const sy = fy * window.innerHeight;
          let best = null, bestD = Infinity;
          ObGraph.graphData().nodes.forEach(n => {
            const sc = ObGraph.graph2ScreenCoords(n.x, n.y, n.z);
            const d = Math.hypot(sc.x - sx, sc.y - sy);
            if (d < bestD) { bestD = d; best = n; }
          });
          const nearest = bestD < 100 ? best : null;

          // Hysteresis: require OB_HOVER_FRAMES consecutive frames to commit hover
          if (nearest === ob_hoverNode) {
            ob_candidateNode   = null;
            ob_candidateFrames = 0;
            // Already hovering this node — accumulate hold frames
            if (nearest) {
              ob_pointFrames++;
              const pct = Math.min(1, ob_pointFrames / OB_CLICK_FRAMES);
              fbEl.textContent = '→ ' + nearest.name + ' [' + Math.round(pct * 100) + '%]';
              if (ob_pointFrames >= OB_CLICK_FRAMES) advanceObStep();
            } else {
              ob_pointFrames = 0;
              fbEl.textContent = '';
            }
          } else {
            // Different node — require consecutive frames before switching
            if (nearest === ob_candidateNode) {
              ob_candidateFrames++;
            } else {
              ob_candidateNode   = nearest;
              ob_candidateFrames = 1;
            }
            if (ob_candidateFrames >= OB_HOVER_FRAMES) {
              ob_hoverNode       = nearest;
              ob_pointFrames     = 0;
              ob_candidateNode   = null;
              ob_candidateFrames = 0;
            }
          }
        } else {
          // Not pointing — reset candidate streak but keep hover
          ob_candidateNode   = null;
          ob_candidateFrames = 0;
          ob_pointFrames     = 0;
          fbEl.textContent   = '';
        }
        return;
      }

      // ── Step 2 — zoom: accumulate real distance change ────────────────
      if (obStep === 2) {
        if (hands.length >= 2) {
          const a = hands[0][9], b = hands[1][9];
          const dist = Math.hypot(b.x - a.x, b.y - a.y);
          if (ob_twoHandPrevDist !== null) {
            const ratio = dist / ob_twoHandPrevDist;
            ob_camR = Math.max(100, Math.min(1200, ob_camR / ratio));
            ob_updateCamera();
            ob_zoomTotal += Math.abs(Math.log(ratio));
            const pct = Math.min(1, ob_zoomTotal / OB_ZOOM_THRESHOLD);
            fbEl.textContent = 'ZOOM [' + Math.round(pct * 100) + '%]';
            if (ob_zoomTotal >= OB_ZOOM_THRESHOLD) advanceObStep();
          }
          ob_twoHandPrevDist = dist;
          ob_wasTwoHands = true;
        } else {
          ob_twoHandPrevDist = null;
          if (ob_wasTwoHands) {
            ob_zoomCooldown = HT_ZOOM_COOLDOWN;
            ob_wasTwoHands = false;
          }
        }
        return;
      }

      // ── Step 3 — fist: hold 1s ───────────────────────────────────────
      if (obStep === 3) {
        if (gesture === 'fist') {
          ob_fistFrames++;
          const pct = Math.min(1, ob_fistFrames / OB_FIST_FRAMES);
          fbEl.textContent = 'RESET [' + Math.round(pct * 100) + '%]';
          if (ob_fistFrames >= OB_FIST_FRAMES) advanceObStep();
        } else {
          ob_fistFrames = 0;
          fbEl.textContent = '';
        }
        return;
      }
    }

    // Camera spherical state
    let ht_camPhi   = 0;
    let ht_camTheta = Math.PI / 2;
    let ht_camR     = SCALE * 2.5;
    let ht_prevX    = null;
    let ht_prevY    = null;
    let ht_twoHandPrevDist = null;
    let ht_hoverNode = null;
    let ht_pointFrames = 0;
    let ht_fistFrames  = 0;
    let ht_noHandFrames = 0;
    let ht_candidateNode   = null;  // node being considered for hover change
    let ht_candidateFrames = 0;     // consecutive frames with that candidate
    const HT_CLICK_FRAMES   = 45;   // hold 0.75s to select
    const HT_FIST_FRAMES    = 30;   // hold 1s to reset
    const HT_HOVER_FRAMES   = 4;    // consecutive frames needed to commit hover change
    const HT_RELEASE_FRAMES = 120;  // 2s without hand → re-enable mouse
    let ht_zoomCooldown     = 0;    // frames to ignore after zoom ends
    const HT_ZOOM_COOLDOWN  = 10;   // ~330ms grace period after zoom

    // Fix 2 — Hysteresis for finger extension detection
    const ht_extendedState = [false, false, false, false];
    const HT_EXTEND_MARGIN = 0.015;

    // Fix 3 — Gesture lock + debounce
    let ht_lastGesture = 'other';
    let ht_pendGesture = 'other';
    let ht_pendFrames  = 0;
    let ht_lockFrames  = 0;
    const HT_GESTURE_DEBOUNCE = 3;
    const HT_GESTURE_LOCK = 8;
    // Onboarding parallel debounce state
    let ob_lastGesture = 'other';
    let ob_pendGesture = 'other';
    let ob_pendFrames  = 0;
    let ob_lockFrames  = 0;

    // Fix 4 — Two-hand tracking for cooldown race fix
    let ht_wasTwoHands = false;
    let ob_wasTwoHands = false;

    // Fix 5 — EMA smoothing of landmarks
    const HT_EMA_ALPHA = 0.45;
    let ht_emaState = { lm: null };
    let ob_emaState = { lm: null };

    function ht_updateCamera() {
      if (!Graph) return;
      const sinT = Math.sin(ht_camTheta);
      const cosT = Math.cos(ht_camTheta);
      const sinP = Math.sin(ht_camPhi);
      const cosP = Math.cos(ht_camPhi);
      Graph.cameraPosition(
        { x: ht_camR * sinT * sinP, y: ht_camR * cosT, z: ht_camR * sinT * cosP },
        { x: 0, y: 0, z: 0 },
        0
      );
    }

    function ht_isExtended(lm, tip, pip, fingerIdx) {
      const diff = lm[pip].y - lm[tip].y;
      if (ht_extendedState[fingerIdx]) {
        if (diff < -HT_EXTEND_MARGIN) ht_extendedState[fingerIdx] = false;
      } else {
        if (diff > HT_EXTEND_MARGIN) ht_extendedState[fingerIdx] = true;
      }
      return ht_extendedState[fingerIdx];
    }

    function ht_gesture(lm) {
      const idx  = ht_isExtended(lm, 8,  6,  0);
      const mid  = ht_isExtended(lm, 12, 10, 1);
      const ring = ht_isExtended(lm, 16, 14, 2);
      const pink = ht_isExtended(lm, 20, 18, 3);
      const n    = [idx, mid, ring, pink].filter(Boolean).length;
      if (n === 0)                        return 'fist';
      if (idx && !mid && !ring && !pink)  return 'point';
      if (n >= 3)                         return 'palm';
      return 'other';
    }

    // Fix 3 — Gesture lock + debounce transitions
    function ht_debouncedGesture(raw) {
      if (ht_lockFrames > 0) {
        ht_lockFrames--;
        ht_pendFrames = 0;
        return ht_lastGesture;
      }
      if (raw === ht_lastGesture) { ht_pendFrames = 0; return raw; }
      const threshold = (raw === 'other') ? 5 : HT_GESTURE_DEBOUNCE;
      if (raw === ht_pendGesture) ht_pendFrames++;
      else { ht_pendGesture = raw; ht_pendFrames = 1; }
      if (ht_pendFrames >= threshold) {
        ht_lastGesture = raw;
        ht_pendFrames  = 0;
        ht_lockFrames  = HT_GESTURE_LOCK;
        return raw;
      }
      return ht_lastGesture;
    }

    function ob_debouncedGesture(raw) {
      if (ob_lockFrames > 0) {
        ob_lockFrames--;
        ob_pendFrames = 0;
        return ob_lastGesture;
      }
      if (raw === ob_lastGesture) { ob_pendFrames = 0; return raw; }
      const threshold = (raw === 'other') ? 5 : HT_GESTURE_DEBOUNCE;
      if (raw === ob_pendGesture) ob_pendFrames++;
      else { ob_pendGesture = raw; ob_pendFrames = 1; }
      if (ob_pendFrames >= threshold) {
        ob_lastGesture = raw;
        ob_pendFrames  = 0;
        ob_lockFrames  = HT_GESTURE_LOCK;
        return raw;
      }
      return ob_lastGesture;
    }

    // Fix 5 — EMA smoothing of landmarks
    function ht_smoothLandmarks(rawLm, state) {
      if (!state.lm) {
        state.lm = rawLm.map(p => ({ x: p.x, y: p.y, z: p.z }));
        return state.lm;
      }
      for (let i = 0; i < 21; i++) {
        state.lm[i].x = HT_EMA_ALPHA * rawLm[i].x + (1 - HT_EMA_ALPHA) * state.lm[i].x;
        state.lm[i].y = HT_EMA_ALPHA * rawLm[i].y + (1 - HT_EMA_ALPHA) * state.lm[i].y;
        state.lm[i].z = HT_EMA_ALPHA * rawLm[i].z + (1 - HT_EMA_ALPHA) * state.lm[i].z;
      }
      return state.lm;
    }

    function ht_nearestNode(nx, ny) {
      if (!Graph) return null;
      const sx = nx * window.innerWidth;
      const sy = ny * window.innerHeight;
      let best = null, bestD = Infinity;
      Graph.graphData().nodes.forEach(n => {
        const sc = Graph.graph2ScreenCoords(n.x, n.y, n.z);
        const d  = Math.hypot(sc.x - sx, sc.y - sy);
        if (d < bestD) { bestD = d; best = n; }
      });
      return bestD < 80 ? best : null;
    }

    function ht_setLabel(text) {
      const el = document.getElementById('ht-gesture-label');
      if (el) el.textContent = text;
    }

    function ht_onResults(results) {
      // Draw skeleton on overlay canvas
      const canvas = document.getElementById('ht-canvas');
      const ctx    = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const hands = results.multiHandLandmarks || [];

      if (hands.length > 0) {
        hands.forEach(lm => {
          drawConnectors(ctx, lm, HAND_CONNECTIONS,
            { color: 'rgba(255,255,255,0.35)', lineWidth: 1 });
          drawLandmarks(ctx, lm,
            { color: '#00ff88', lineWidth: 0, radius: 2 });
        });
      }

      // No hands
      if (hands.length === 0) {
        ht_prevX = null; ht_prevY = null;
        ht_twoHandPrevDist = null;
        ht_pointFrames     = 0;
        ht_fistFrames      = 0;
        ht_candidateNode   = null;
        ht_candidateFrames = 0;
        ob_fistFrames      = 0;
        ob_prevX           = null; ob_prevY = null;
        ob_twoHandPrevDist = null;
        ht_zoomCooldown    = 0;
        ob_zoomCooldown    = 0;
        // Fix 2 reset
        ht_extendedState.fill(false);
        // Fix 3 reset
        ht_lastGesture = 'other'; ht_pendGesture = 'other'; ht_pendFrames = 0; ht_lockFrames = 0;
        ob_lastGesture = 'other'; ob_pendGesture = 'other'; ob_pendFrames = 0; ob_lockFrames = 0;
        // Fix 5 reset
        ht_emaState.lm = null; ob_emaState.lm = null;
        ht_noHandFrames++;
        if (ht_noHandFrames > HT_RELEASE_FRAMES && Graph) {
          Graph.controls().enabled = true;
        }
        ht_setLabel('NO HAND');
        return;
      }

      ht_noHandFrames = 0;
      if (Graph) Graph.controls().enabled = false;

      // ── Onboarding ────────────────────────────────────────────────────────
      if (appState === 'onboarding') {
        // Post-zoom cooldown — suppress flicker when second hand leaves
        if (ob_zoomCooldown > 0 && hands.length < 2) {
          ob_zoomCooldown--;
          return;
        }
        const rawLm   = hands[0];
        const lm      = ht_smoothLandmarks(rawLm, ob_emaState);
        const rawGesture = ht_gesture(lm);
        const gesture    = ob_debouncedGesture(rawGesture);
        const px = 1 - lm[9].x;
        const py = lm[9].y;
        handleOnboardingFrame(results, hands, lm, gesture, px, py);
        return;
      }

      // ── Two hands → zoom ───────────────────────────────────────────────────
      if (hands.length >= 2) {
        const a = hands[0][9], b = hands[1][9];
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        if (ht_twoHandPrevDist !== null) {
          const ratio = dist / ht_twoHandPrevDist;
          ht_camR = Math.max(SCALE * 0.4, Math.min(SCALE * 6, ht_camR / ratio));
          ht_updateCamera();
        }
        ht_twoHandPrevDist = dist;
        ht_prevX           = null;
        ht_pointFrames     = 0;
        ht_fistFrames      = 0;
        ht_candidateNode   = null;
        ht_candidateFrames = 0;
        ht_wasTwoHands     = true;
        ht_lastGesture = 'other'; ht_pendGesture = 'other'; ht_pendFrames = 0; ht_lockFrames = 0;
        ht_setLabel('ZOOM');
        return;
      }
      ht_twoHandPrevDist = null;
      if (ht_wasTwoHands) {
        ht_zoomCooldown = HT_ZOOM_COOLDOWN;
        ht_wasTwoHands = false;
      }

      // Cooldown after zoom — suppress gesture flicker when second hand leaves
      if (ht_zoomCooldown > 0) {
        ht_zoomCooldown--;
        ht_prevX = null;
        ht_setLabel('ZOOM');
        return;
      }

      const rawLm   = hands[0];
      const lm      = ht_smoothLandmarks(rawLm, ht_emaState);
      const rawGesture = ht_gesture(lm);
      const gesture    = ht_debouncedGesture(rawGesture);
      // Mirror x so it feels like a mirror
      const px = 1 - lm[9].x;
      const py = lm[9].y;

      // ── Fist → hold 1s to reset ────────────────────────────────────────────
      if (gesture === 'fist') {
        ht_prevX = null;
        ht_pointFrames = 0;
        ht_fistFrames++;
        const pct = Math.min(1, ht_fistFrames / HT_FIST_FRAMES);
        ht_setLabel(`RESET [${Math.round(pct * 100)}%]`);
        if (ht_fistFrames >= HT_FIST_FRAMES) {
          ht_fistFrames = 0;
          ht_hoverNode  = null;
          ht_camR = SCALE * 2.5; ht_camPhi = 0; ht_camTheta = Math.PI / 2;
          ht_updateCamera();
          if (Graph) handleNodeHover(null);
          if (typeof hideDetailCard === 'function') hideDetailCard();
          ht_setLabel('RESET');
        }
        return;
      }
      ht_fistFrames = 0;

      // ── Palm → orbit camera ────────────────────────────────────────────────
      if (gesture === 'palm') {
        if (ht_prevX !== null) {
          const dx = px - ht_prevX;
          const dy = py - ht_prevY;
          ht_camPhi   -= dx * 3.5;
          ht_camTheta -= dy * 2.0;
          ht_camTheta  = Math.max(0.1, Math.min(Math.PI - 0.1, ht_camTheta));
          ht_updateCamera();
        }
        ht_prevX           = px;
        ht_prevY           = py;
        ht_pointFrames     = 0;
        ht_candidateNode   = null;
        ht_candidateFrames = 0;
        ht_setLabel('ROTATE');
        return;
      }

      // ── Point → hover / hold to select ────────────────────────────────────
      if (gesture === 'point') {
        const fx = 1 - lm[8].x;
        const fy = lm[8].y;
        let nearest = ht_nearestNode(fx, fy);
        ht_prevX = null;

        // Auto-select when entering point with no hover: pick the most camera-forward
        // node within a central screen region (smallest NDC z = closest to viewer)
        if (!nearest && ht_hoverNode === null && Graph) {
          const cx = window.innerWidth / 2;
          const cy = window.innerHeight / 2;
          const radius = Math.min(window.innerWidth, window.innerHeight) * 0.4;
          const camera = Graph.camera();
          let bestZ = Infinity, bestN = null;
          Graph.graphData().nodes.forEach(n => {
            const sc = Graph.graph2ScreenCoords(n.x, n.y, n.z);
            if (Math.hypot(sc.x - cx, sc.y - cy) < radius) {
              const v = new THREE.Vector3(n.x, n.y, n.z).project(camera);
              if (v.z < bestZ) { bestZ = v.z; bestN = n; }
            }
          });
          if (bestN) nearest = bestN; // feed into normal hover flow below
        }

        if (nearest === ht_hoverNode) {
          // Same node — clear candidate streak and accumulate for click
          ht_candidateNode   = null;
          ht_candidateFrames = 0;
          if (nearest) {
            ht_pointFrames++;
            const pct = Math.min(1, ht_pointFrames / HT_CLICK_FRAMES);
            if (ht_pointFrames >= HT_CLICK_FRAMES) {
              if (Graph) handleNodeClick(nearest);
              ht_pointFrames = 0;
            }
            ht_setLabel(`→ ${nearest.name.slice(0, 18)} [${Math.round(pct * 100)}%]`);
            return;
          }
        } else {
          // Different node — require HT_HOVER_FRAMES consecutive frames before committing
          if (nearest === ht_candidateNode) {
            ht_candidateFrames++;
          } else {
            ht_candidateNode   = nearest;
            ht_candidateFrames = 1;
          }
          if (ht_candidateFrames >= HT_HOVER_FRAMES) {
            ht_hoverNode       = nearest;
            ht_pointFrames     = 0;
            ht_candidateNode   = null;
            ht_candidateFrames = 0;
            if (Graph) handleNodeHover(nearest);
          }
        }

        ht_setLabel(ht_hoverNode ? `→ ${ht_hoverNode.name.slice(0, 20)}` : 'POINT');
        return;
      }

      ht_prevX           = null;
      ht_pointFrames     = 0;
      ht_candidateNode   = null;
      ht_candidateFrames = 0;
      ht_setLabel('');
    }

    function ht_init() {
      const video = document.getElementById('ht-video');
      const mpHands = new Hands({
        locateFile: file =>
          `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
      });
      mpHands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.5
      });
      mpHands.onResults(ht_onResults);

      const cam = new Camera(video, {
        onFrame: async () => { await mpHands.send({ image: video }); },
        width: 320,
        height: 180
      });
      cam.start();
      ht_setLabel('LOADING MODEL...');
    }

    // Start hand tracking when the setup screen is hidden (graph is ready)
    const _htObserver = new MutationObserver(() => {
      if (document.getElementById('setup').classList.contains('hidden')) {
        _htObserver.disconnect();
        // Sync spherical coords with initial camera position
        ht_camR = SCALE * 2.5; ht_camPhi = 0; ht_camTheta = Math.PI / 2;
        ht_init();
        appState = 'onboarding';
        startOnboarding();
      }
    });
    _htObserver.observe(document.getElementById('setup'),
      { attributes: true, attributeFilter: ['class'] });

  </script>

  <!-- Onboarding screen -->
  <div id="onboarding" class="hidden">
    <div id="ob-graph"></div>
    <div id="ob-splash">
      <div id="ob-splash-icon"></div>
      <div id="ob-splash-verb"></div>
      <div id="ob-splash-desc"></div>
      <div id="ob-splash-hand"></div>
    </div>
    <div id="ob-hud">
      <div id="ob-step-counter">1 / 4</div>
      <div id="ob-icon">✋</div>
      <div id="ob-verb">ROTAR</div>
      <div id="ob-desc"></div>
      <div id="ob-hand-icon"></div>
      <div id="ob-feedback"></div>
    </div>
    <div id="ob-dots">
      <span class="ob-dot ob-dot--active" data-i="0"></span>
      <span class="ob-dot" data-i="1"></span>
      <span class="ob-dot" data-i="2"></span>
      <span class="ob-dot" data-i="3"></span>
    </div>
    <button id="ob-skip">SKIP</button>
  </div>

  <!-- Hand Tracking elements -->
  <video id="ht-video" playsinline></video>
  <div id="ht-container">
    <canvas id="ht-canvas" width="320" height="180"></canvas>
    <div id="ht-gesture-label">WAITING FOR CAMERA...</div>
    <div id="ht-hint">PALM → ROTATE<br>POINT → SELECT (HOLD)<br>FIST → RESET<br>2 HANDS → ZOOM</div>
  </div>

</body>
</html>
