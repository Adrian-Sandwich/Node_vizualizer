<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Graph Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    /* ═══════════════════════════════════════════════
       CSS Custom Properties
       ═══════════════════════════════════════════════ */
    :root {
      --bg: #0a0a0f;
      --bg-panel: rgba(8, 8, 7, 0.88);
      --border: #cd6d13;
      --text: #e8cea6;
      --text-dim: #cd8218;
      --text-bright: #ffeab8;
      --mono: 'JetBrains Mono', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --blue: #d07b1b;
      --cyan: #d4a843;
      --light-cyan: #e8c46a;
      --indigo: #c47a43;
      --amber: #d4a843;
    }

    /* ═══════════════════════════════════════════════
       Reset & Base
       ═══════════════════════════════════════════════ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    :focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    :focus:not(:focus-visible) {
      outline: none;
    }

    .hidden {
      display: none !important;
    }

    /* ═══════════════════════════════════════════════
       Onboarding
       ═══════════════════════════════════════════════ */
    #onboarding {
      position: fixed; inset: 0; z-index: 50;
      background: var(--bg);
    }
    #ob-graph { position: absolute; inset: 0; }

    #ob-hud {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      text-align: center; font-family: var(--mono);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none;
      background: rgba(10,10,15,0.7); padding: 24px 48px; border: 1px solid var(--border);
      transition: opacity 0.4s ease;
    }
    #ob-step-counter { font-size: 12px; color: var(--text-dim); letter-spacing: .1em; }
    #ob-icon         { font-size: 52px; line-height: 1; }
    #ob-verb         { font-size: 28px; font-weight: 700; color: var(--text-bright);
                       letter-spacing: .12em; }
    #ob-desc         { font-size: 13px; color: var(--text); max-width: 340px; line-height: 1.5; }
    #ob-feedback     { font-size: 14px; color: #4caf50; font-weight: 700;
                       letter-spacing: .08em; min-height: 20px; }

    #ob-hud.ob-hud--success { border-color: #4caf50; }

    /* Intro splash — large centered description before interaction */
    #ob-splash {
      position: absolute; inset: 0; z-index: 60;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
      font-family: var(--mono); text-align: center;
      opacity: 1; transition: opacity 0.6s ease;
    }
    #ob-splash.ob-splash--hidden { opacity: 0; pointer-events: none; }
    #ob-splash-icon { font-size: 72px; margin-bottom: 16px; }
    #ob-splash-verb { font-size: 42px; font-weight: 700; color: var(--text-bright);
                      letter-spacing: .14em; margin-bottom: 12px; }
    #ob-splash-desc { font-size: 18px; color: var(--text); max-width: 480px;
                      line-height: 1.6; margin-bottom: 24px; }
    #ob-splash-hand { margin-bottom: 0; }
    #ob-splash-hand svg { width: 120px; height: 120px; }

    /* Hand illustration in HUD (small, persistent during step) */
    #ob-hand-icon { margin-top: 4px; }
    #ob-hand-icon svg { width: 48px; height: 48px; }

    #ob-dots {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px;
    }
    .ob-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(205,109,19,0.3); transition: background .3s;
    }
    .ob-dot--active  { background: var(--border); }
    .ob-dot--done    { background: #4caf50; }

    #ob-skip {
      position: absolute; bottom: 36px; right: 48px; z-index: 70;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      letter-spacing: .08em; color: var(--text-dim);
      background: rgba(10,10,15,0.6); border: 1px solid var(--border);
      padding: 10px 28px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #ob-skip:hover { color: var(--text-bright); border-color: var(--text-bright); }

    /* ═══════════════════════════════════════════════
       Setup Screen
       ═══════════════════════════════════════════════ */
    #setup {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #setup-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #setup-subtitle {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: -10px;
      margin-bottom: 16px;
    }

    #api-key-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    #api-key-input {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      width: 320px;
      box-sizing: border-box;
      letter-spacing: 0.04em;
      transition: border-color 200ms ease;
    }

    #api-key-input::placeholder {
      color: var(--text-dim);
    }

    #api-key-input:focus {
      border-color: var(--blue);
    }

    #pick-folder-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 10px 24px;
      width: 320px;
      box-sizing: border-box;
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease;
    }

    #pick-folder-btn:hover {
      border-color: var(--blue);
      color: var(--text-bright);
    }

    #load-cache-btn {
      background: transparent;
      border: 1px solid var(--blue);
      border-radius: 0;
      color: var(--blue);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 10px 24px;
      width: 320px;
      box-sizing: border-box;
      cursor: pointer;
      transition: background 200ms ease, color 200ms ease;
    }

    #load-cache-btn:hover {
      background: var(--blue);
      color: var(--text-bright);
    }

    #setup-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      min-height: 1.4em;
      margin-top: 8px;
    }

    /* ═══════════════════════════════════════════════
       Main View
       ═══════════════════════════════════════════════ */

    /* -- Graph container -- */
    #graph {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* -- Title (top-left) -- */
    #title {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      pointer-events: none;
    }

    #reanalyze-btn {
      position: fixed;
      top: 40px;
      left: 20px;
      z-index: 10;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease;
    }

    #reanalyze-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    /* -- Topology Switcher (top-center) -- */
    #controls {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: stretch;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 0;
      z-index: 10;
    }

    #controls button {
      background: transparent;
      color: var(--text-dim);
      border: none;
      padding: 8px 18px;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 200ms ease, border-color 200ms ease;
    }

    #controls button:hover {
      color: var(--text);
    }

    #controls button.active {
      color: var(--text-bright);
      border-bottom-color: var(--blue);
    }

    /* Dividers between control buttons */
    #controls button + button {
      border-left: 1px solid var(--border);
    }

    /* -- Info Panel (left side: network stats + clusters + key hint) -- */
    #info-panel {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      z-index: 10;
      background: var(--bg-panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      pointer-events: none;
      min-width: 180px;
    }

    .info-section {
      padding: 7px 12px;
    }

    .info-section + .info-section {
      border-top: 1px solid var(--border);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 2px;
      line-height: 1.5;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-key {
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .info-val {
      color: var(--text-bright);
      text-align: right;
    }

    /* ── Hand Tracking Overlay ── */
    #ht-container {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 20;
      width: 200px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.5);
    }
    #ht-video  { display: none; }
    #ht-canvas {
      width: 200px;
      height: 112px;
      display: block;
      transform: scaleX(-1);
    }
    #ht-gesture-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.10em;
      color: var(--text-dim);
      padding: 3px 8px;
      text-transform: uppercase;
      min-height: 1.4em;
    }
    #ht-hint {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 0 8px 4px;
      opacity: 0.5;
      line-height: 1.6;
    }

    #key-hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      opacity: 0.5;
      pointer-events: none;
      z-index: 10;
    }

    /* -- Layout Description (below controls) -- */
    #layout-desc {
      position: fixed;
      top: 58px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      pointer-events: none;
      white-space: nowrap;
    }

    /* -- Boot Status Overlay (centered) -- */
    #boot-status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    #boot-stage {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text);
    }

    #boot-detail {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    /* -- Side Panel (Detail Card) -- */
    #detail-card {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--panel-width, 360px);
      height: 100vh;
      overflow-y: auto;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid var(--border);
      z-index: 15;
      padding: 20px;
      transform: translateX(100%);
      transition: transform 300ms ease;
    }

    #detail-card.visible {
      transform: translateX(0);
    }

    /* -- Panel Resize Handle -- */
    #panel-resize {
      position: fixed;
      top: 0;
      width: 5px;
      height: 100vh;
      cursor: col-resize;
      z-index: 16;
      background: transparent;
      transition: background 150ms ease;
      display: none;
    }

    #panel-resize:hover,
    #panel-resize.dragging {
      background: var(--blue);
    }

    /* Scrollbar styling for detail card */
    #detail-card::-webkit-scrollbar {
      width: 4px;
    }

    #detail-card::-webkit-scrollbar-track {
      background: transparent;
    }

    #detail-card::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 0.04em;
      word-break: break-word;
    }

    #card-close {
      background: transparent;
      border: none;
      border-radius: 0;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 16px;
      cursor: pointer;
      padding: 0 0 0 8px;
      line-height: 1;
      transition: color 200ms ease;
      flex-shrink: 0;
    }

    #card-close:hover {
      color: var(--text-bright);
    }

    #card-cluster {
      margin-bottom: 10px;
    }

    .cluster-badge {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 0;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      color: var(--text);
    }

    #card-meta {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 10px;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      font-size: 11px;
      line-height: 1.6;
      margin-bottom: 2px;
    }

    .meta-key {
      font-family: var(--mono);
      color: var(--text-dim);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .meta-val {
      font-family: var(--sans);
      color: var(--text);
      word-break: break-word;
    }

    .meta-val a {
      color: var(--blue);
      text-decoration: none;
    }

    #card-preview {
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #card-connections {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 10px;
    }

    .conn-header {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .conn-item {
      font-size: 11px;
      line-height: 1.4;
      padding: 8px 0;
      border-bottom: 1px solid rgba(26, 42, 58, 0.5);
    }

    .conn-item:last-child {
      border-bottom: none;
    }

    .conn-edge {
      font-family: var(--mono);
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 3px;
    }

    .conn-edge .arrow {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .conn-edge .label {
      font-family: var(--sans);
      font-style: italic;
      color: var(--text-dim);
    }

    .conn-name {
      font-family: var(--mono);
      color: var(--text);
      display: block;
      padding-left: 16px;
      font-size: 11px;
      cursor: pointer;
      transition: color 150ms ease;
    }

    .conn-name:hover {
      color: var(--text-bright);
    }

    /* -- Markers (medoid, LLM center) -- */
    .marker.medoid {
      color: #ef4444;
    }

    .marker.llm-center {
      color: #fb923c;
    }

    /* -- Cluster Labels Overlay -- */
    #cluster-labels {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
    }

    .cluster-label {
      position: absolute;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* -- Legend items inside info-panel -- */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
      line-height: 1.5;
    }

    .legend-item:last-child {
      margin-bottom: 0;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 0;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 11px;
      color: var(--text-bright);
      white-space: nowrap;
    }

    .legend-special {
      border-top: 1px solid var(--border);
      margin-top: 5px;
      padding-top: 5px;
    }

    /* -- Scene Tooltip -- */
    .scene-tooltip {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 6px 10px;
      color: var(--text);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════
       Reduced Motion
       ═══════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ═══════════════════════════════════════════════
       Config Panel
       ═══════════════════════════════════════════════ */
    /* ── CSS2D node labels ── */
    .node-label {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.3;
      color: #f4e7cd;
      pointer-events: none;
      padding-left: 1.1em;
      text-indent: -1.1em;
      white-space: nowrap;
      opacity: 1.0;
      transition: opacity 0.15s ease;
    }
    .node-label .nl-bullet {
      font-size: 9px;
      vertical-align: 1px;
    }
    .node-label--special {
      color: #eedcb0;
      opacity: 0.7;
    }

    .node-label.label-selected {
      opacity: 1 !important;
      font-weight: 700;
    }
    .node-label.label-selected .nl-bullet {
      text-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
      font-size: 12px;
    }
    .node-label.label-dim {
      opacity: 0.06 !important;
    }
    .node-label.label-neighbor2 {
      font-size: 9px !important;
      color: #7a7a7a !important;
    }

    /* Square-only mode — hide text, show just the bullet */
    .squares-only .node-label {
      padding-left: 0;
      text-indent: 0;
      text-align: center;
    }
    .squares-only .node-label .nl-text { display: none; }
    .squares-only .node-label .nl-bullet { font-size: 12px; }

    #theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease;
    }
    #theme-toggle:hover {
      color: var(--text);
      border-color: var(--blue);
    }

  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       Setup Screen
       ═══════════════════════════════════════════════ -->
  <div id="setup">
    <div id="setup-title">GRAPH VISUALIZER</div>
    <div id="setup-subtitle">SCOPE // v1.0</div>
    <label for="api-key-input" id="api-key-label">GEMINI API KEY</label>
    <input
      type="password"
      id="api-key-input"
      placeholder="PASTE KEY HERE"
      spellcheck="false"
      autocomplete="off"
    >
    <button id="pick-folder-btn">SELECT NOTES FOLDER</button>
    <button id="load-cache-btn" class="hidden">RESUME PREVIOUS SESSION</button>
    <div id="setup-status"></div>
  </div>

  <!-- ═══════════════════════════════════════════════
       Main View
       ═══════════════════════════════════════════════ -->
  <div id="main" class="hidden">

    <!-- Graph container -->
    <div id="graph"></div>

    <!-- Title: top-left -->
    <div id="title">GRAPH VISUALIZER</div>
    <button id="reanalyze-btn" class="hidden">RE-ANALYZE</button>

    <!-- Topology Switcher: top-center -->
    <div id="controls">
      <button class="active" data-layout="central">CENTRALIZED</button>
      <button data-layout="decentral">DECENTRALIZED</button>
      <button data-layout="distrib">DISTRIBUTED</button>
    </div>

    <!-- Info Panel: left side (unified readouts + legend + key hint) -->
    <div id="info-panel">
      <div class="info-section">
        <div class="info-row"><span class="info-key">NODES</span><span class="info-val" id="readout-nodes">0</span></div>
        <div class="info-row"><span class="info-key">EDGES</span><span class="info-val" id="readout-edges">0</span></div>
        <div class="info-row"><span class="info-key">K-NN</span><span class="info-val" id="readout-knn">5</span></div>
      </div>
      <div class="info-section">
        <div id="legend"></div>
      </div>
    </div>

    <div id="key-hint">H — RECENTER</div>

    <!-- Layout Description: below controls -->
    <div id="layout-desc"></div>

    <!-- Boot Status Overlay: centered -->
    <div id="boot-status">
      <div id="boot-stage">INITIALIZING</div>
      <div id="boot-detail"></div>
    </div>

    <!-- Side Panel -->
    <div id="panel-resize"></div>
    <div id="detail-card">
      <div class="card-header">
        <div id="card-title" class="card-title"></div>
        <button id="card-close">&times;</button>
      </div>
      <div id="card-cluster">
        <span class="cluster-badge"></span>
      </div>
      <div id="card-meta"></div>
      <div id="card-preview"></div>
      <div id="card-connections">
        <div class="conn-header">CONNECTIONS</div>
      </div>
    </div>

    <!-- Cluster Labels Overlay -->
    <div id="cluster-labels"></div>

    <!-- Config Panel: bottom-right -->
    <button id="theme-toggle" title="Switch color theme">WARM</button>

  </div><!-- /main -->

  <script type="module">
    import { UMAP } from 'https://esm.sh/umap-js@1.4.0';
    import ForceGraph3D from 'https://esm.sh/3d-force-graph@1';
    import * as THREE from 'https://esm.sh/three@0.170.0';
    import { CSS2DRenderer, CSS2DObject } from 'https://esm.sh/three@0.170.0/addons/renderers/CSS2DRenderer.js';
    import { EffectComposer } from 'https://esm.sh/three@0.170.0/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://esm.sh/three@0.170.0/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://esm.sh/three@0.170.0/addons/postprocessing/UnrealBloomPass.js';

    // ═══════════════════════════════════════════════
    // API Key Persistence
    // ═══════════════════════════════════════════════
    const KEY_STORAGE = 'notes-network-api-key';

    function getSavedApiKey() {
      return localStorage.getItem(KEY_STORAGE) || '';
    }

    function saveApiKey(key) {
      localStorage.setItem(KEY_STORAGE, key);
    }

    // On load, populate input with saved key
    const apiKeyInput = document.getElementById('api-key-input');
    apiKeyInput.value = getSavedApiKey();

    // ═══════════════════════════════════════════════
    // IndexedDB Cache
    // ═══════════════════════════════════════════════

    const DB_NAME = 'notes-network-cache';
    const DB_VERSION = 1;
    const STORE_NAME = 'sessions';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveSession(data) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put({ id: 'latest', ...data, savedAt: Date.now() });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadSession() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get('latest');
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    // Check for cached session on load
    const loadCacheBtn = document.getElementById('load-cache-btn');
    loadSession().then(session => {
      if (session) {
        const ago = Math.round((Date.now() - session.savedAt) / 60000);
        const timeStr = ago < 60 ? `${ago}m ago` : `${Math.round(ago / 60)}h ago`;
        loadCacheBtn.textContent = `RESUME PREVIOUS SESSION // ${session.nodeCount} NOTES // ${timeStr}`;
        loadCacheBtn.classList.remove('hidden');
      }
    }).catch(() => {});

    // ═══════════════════════════════════════════════
    // Folder Picker & Note Reading
    // ═══════════════════════════════════════════════
    async function pickFolder() {
      const dirHandle = await window.showDirectoryPicker();
      const filenames = [];

      async function scanDir(handle) {
        for await (const entry of handle.values()) {
          if (entry.kind === 'file') {
            const name = entry.name.toLowerCase();
            if (name.endsWith('.md') || name.endsWith('.txt')) filenames.push(entry.name);
          } else if (entry.kind === 'directory') {
            await scanDir(entry);
          }
        }
      }

      await scanDir(dirHandle);
      filenames.sort();
      return { dirHandle, folderName: dirHandle.name, filenames };
    }

    async function readNotesFromHandle(dirHandle) {
      const notes = [];
      let id = 0;

      async function readDir(handle) {
        for await (const entry of handle.values()) {
          if (entry.kind === 'file') {
            const name = entry.name.toLowerCase();
            if (name.endsWith('.md') || name.endsWith('.txt')) {
              const file = await entry.getFile();
              const text = await file.text();
              if (text.trim()) {
                notes.push({ id: id++, filename: entry.name, text: text.trim() });
              }
            }
          } else if (entry.kind === 'directory') {
            await readDir(entry);
          }
        }
      }

      await readDir(dirHandle);
      return notes;
    }

    function folderFingerprint(folderName, filenames) {
      return folderName + '::' + filenames.join('|');
    }

    // ═══════════════════════════════════════════════
    // Button Wiring & Screen Transition
    // ═══════════════════════════════════════════════
    const pickFolderBtn = document.getElementById('pick-folder-btn');
    const setupStatus = document.getElementById('setup-status');

    // Restore graph from a cached session object
    function restoreFromCache(session) {
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      document.getElementById('reanalyze-btn').classList.remove('hidden');

      setBootStage('RESTORING...', `${session.nodeCount} NOTES`);

      allNodes = session.graphNodes;
      edgeSets = {
        central: (session.centralEdges || []).map(e => ({ ...e, topology: 'central' })),
        decentral: (session.decentralEdges || []).map(e => ({ ...e, topology: 'decentral' })),
        distrib: (session.labeledEdges || []).map(e => ({ ...e, topology: 'distrib' })),
      };
      const combined = [...edgeSets.central, ...edgeSets.decentral, ...edgeSets.distrib];
      initGraph(allNodes, combined);
      buildLegend(session.clusterNames);
      buildClusterLabels(session.clusterNames);
      const activeEdges = edgeSets[currentLayout] || [];
      buildReadouts(session.nodeCount, activeEdges.length);

      setBootStage(`SCOPE ONLINE // ${session.nodeCount} NODES // ${activeEdges.length} EDGES`, 'RESTORED FROM CACHE');
      setTimeout(hideBootStatus, 2000);
    }

    // Track the last-picked dirHandle so RE-ANALYZE can re-read the same folder
    let lastDirHandle = null;

    pickFolderBtn.addEventListener('click', async () => {
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        setupStatus.textContent = 'ERROR: API KEY REQUIRED';
        return;
      }
      saveApiKey(apiKey);

      try {
        setupStatus.textContent = 'SCANNING...';
        const { dirHandle, folderName, filenames } = await pickFolder();
        if (filenames.length === 0) {
          setupStatus.textContent = 'ERROR: NO .MD OR .TXT FILES FOUND';
          return;
        }
        lastDirHandle = dirHandle;
        setupStatus.textContent = `FOUND ${filenames.length} NOTES`;

        // Check cache for matching folder
        const fp = folderFingerprint(folderName, filenames);
        const session = await loadSession().catch(() => null);
        if (session && session.fingerprint === fp) {
          setupStatus.textContent = `CACHE HIT — RESTORING ${session.nodeCount} NOTES`;
          await sleep(300);
          restoreFromCache(session);
          return;
        }

        // No cache match — read full content and run pipeline
        setupStatus.textContent = `READING ${filenames.length} NOTES...`;
        const notes = await readNotesFromHandle(dirHandle);
        if (notes.length === 0) {
          setupStatus.textContent = 'ERROR: NO .MD OR .TXT FILES FOUND';
          return;
        }
        setupStatus.textContent = `LOADED ${notes.length} NOTES`;

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');
        document.getElementById('reanalyze-btn').classList.remove('hidden');

        runPipeline(notes, apiKey, fp);
      } catch (err) {
        if (err.name === 'AbortError') return; // user cancelled picker
        setupStatus.textContent = 'ERROR: ' + err.message.toUpperCase();
      }
    });

    // Load from cache (fallback button — no folder match needed)
    loadCacheBtn.addEventListener('click', async () => {
      try {
        setupStatus.textContent = 'LOADING CACHED SESSION...';
        const session = await loadSession();
        if (!session) {
          setupStatus.textContent = 'ERROR: NO CACHED SESSION FOUND';
          return;
        }
        restoreFromCache(session);
      } catch (err) {
        setupStatus.textContent = 'ERROR: ' + err.message.toUpperCase();
      }
    });

    // RE-ANALYZE button — force re-run pipeline on the same folder
    document.getElementById('reanalyze-btn').addEventListener('click', async () => {
      const apiKey = getSavedApiKey();
      if (!apiKey) return;
      if (!lastDirHandle) {
        // No folder handle — need to re-pick
        document.getElementById('main').classList.add('hidden');
        document.getElementById('setup').classList.remove('hidden');
        setupStatus.textContent = 'SELECT FOLDER AGAIN TO RE-ANALYZE';
        return;
      }
      try {
        setBootStage('RE-ANALYZING...', 'READING NOTES');
        showBootStatus();
        const notes = await readNotesFromHandle(lastDirHandle);
        if (notes.length === 0) {
          setBootStage('ERROR', 'NO NOTES FOUND');
          return;
        }
        // Scan filenames for fingerprint
        const filenames = notes.map(n => n.filename).sort();
        const fp = folderFingerprint(lastDirHandle.name, filenames);
        runPipeline(notes, apiKey, fp);
      } catch (err) {
        setBootStage('ERROR', err.message);
      }
    });

    // ═══════════════════════════════════════════════
    // Gemini API — Embeddings & Generation
    // ═══════════════════════════════════════════════
    const EMBED_MODEL = 'gemini-embedding-001';
    const EMBED_BATCH_SIZE = 20;

    async function embedTexts(texts, apiKey, onProgress) {
      const allEmbeddings = [];

      for (let i = 0; i < texts.length; i += EMBED_BATCH_SIZE) {
        const batch = texts.slice(i, i + EMBED_BATCH_SIZE);
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${EMBED_MODEL}:batchEmbedContents?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              requests: batch.map(text => ({
                model: `models/${EMBED_MODEL}`,
                content: { parts: [{ text }] },
              })),
            }),
          }
        );

        if (!response.ok) {
          const err = await response.json();
          throw new Error(`Embedding API error: ${err.error?.message || response.statusText}`);
        }

        const data = await response.json();
        const vectors = data.embeddings.map(e => e.values);
        allEmbeddings.push(...vectors);
        if (onProgress) onProgress(Math.min(i + EMBED_BATCH_SIZE, texts.length), texts.length);
      }

      return allEmbeddings;
    }

    const LLM_MODEL = 'gemini-2.5-flash';

    async function generateContent(prompt, apiKey, model = LLM_MODEL) {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
          }),
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(`LLM API error: ${err.error?.message || response.statusText}`);
      }

      const data = await response.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    // ═══════════════════════════════════════════════
    // Math Pipeline — Vector Ops, Clustering, PCA, k-NN
    // ═══════════════════════════════════════════════

    function dot(a, b) {
      let sum = 0;
      for (let i = 0; i < a.length; i++) sum += a[i] * b[i];
      return sum;
    }

    function vecNorm(a) {
      return Math.sqrt(dot(a, a));
    }

    function cosineDistance(a, b) {
      const d = dot(a, b) / (vecNorm(a) * vecNorm(b) + 1e-9);
      return 1 - d;
    }

    function cosineDistanceMatrix(embeddings) {
      const n = embeddings.length;
      const matrix = Array.from({ length: n }, () => new Float64Array(n));
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const d = cosineDistance(embeddings[i], embeddings[j]);
          matrix[i][j] = d;
          matrix[j][i] = d;
        }
      }
      return matrix;
    }

    function normalizeRange(arr) {
      let mn = Infinity, mx = -Infinity;
      for (const v of arr) { if (v < mn) mn = v; if (v > mx) mx = v; }
      const range = mx - mn || 1e-9;
      return arr.map(v => 2 * (v - mn) / range - 1);
    }

    function subtractVec(a, b) {
      return a.map((v, i) => v - b[i]);
    }

    function addVec(a, b) {
      return a.map((v, i) => v + b[i]);
    }

    function scaleVec(a, s) {
      return a.map(v => v * s);
    }

    function meanVec(vectors) {
      const n = vectors.length;
      const dim = vectors[0].length;
      const result = new Array(dim).fill(0);
      for (const v of vectors) {
        for (let i = 0; i < dim; i++) result[i] += v[i];
      }
      return result.map(v => v / n);
    }

    // --- KMeans Clustering (k-means++ init) ---

    function kmeans(embeddings, k, maxIter = 50) {
      const n = embeddings.length;
      const dim = embeddings[0].length;

      // k-means++ initialization
      const centroids = [];
      const used = new Set();
      let first = Math.floor(Math.random() * n);
      centroids.push([...embeddings[first]]);
      used.add(first);

      for (let c = 1; c < k; c++) {
        let bestIdx = 0, bestDist = -1;
        for (let i = 0; i < n; i++) {
          if (used.has(i)) continue;
          const minDist = Math.min(...centroids.map(cen => cosineDistance(embeddings[i], cen)));
          if (minDist > bestDist) { bestDist = minDist; bestIdx = i; }
        }
        centroids.push([...embeddings[bestIdx]]);
        used.add(bestIdx);
      }

      let labels = new Int32Array(n);

      for (let iter = 0; iter < maxIter; iter++) {
        let changed = false;
        for (let i = 0; i < n; i++) {
          let bestC = 0, bestD = Infinity;
          for (let c = 0; c < k; c++) {
            const d = cosineDistance(embeddings[i], centroids[c]);
            if (d < bestD) { bestD = d; bestC = c; }
          }
          if (labels[i] !== bestC) changed = true;
          labels[i] = bestC;
        }
        if (!changed) break;

        for (let c = 0; c < k; c++) {
          const members = [];
          for (let i = 0; i < n; i++) {
            if (labels[i] === c) members.push(embeddings[i]);
          }
          if (members.length > 0) centroids[c] = meanVec(members);
        }
      }

      return { labels: Array.from(labels), centroids };
    }

    // --- PCA 3D (power iteration) ---

    function pca3d(embeddings) {
      const n = embeddings.length;
      const dim = embeddings[0].length;
      const mean = meanVec(embeddings);
      const centered = embeddings.map(e => subtractVec(e, mean));
      const components = [];
      let residual = centered.map(row => [...row]);

      for (let comp = 0; comp < Math.min(3, n - 1); comp++) {
        let vec = Array.from({ length: dim }, () => Math.random() - 0.5);
        let vn = vecNorm(vec);
        vec = vec.map(v => v / vn);

        for (let iter = 0; iter < 100; iter++) {
          const projections = residual.map(row => dot(row, vec));
          const newVec = new Array(dim).fill(0);
          for (let i = 0; i < n; i++) {
            for (let j = 0; j < dim; j++) {
              newVec[j] += residual[i][j] * projections[i];
            }
          }
          vn = vecNorm(newVec);
          if (vn < 1e-12) break;
          vec = newVec.map(v => v / vn);
        }

        components.push(vec);
        const projections = residual.map(row => dot(row, vec));
        residual = residual.map((row, i) =>
          row.map((v, j) => v - projections[i] * vec[j])
        );
      }

      // Pad to 3 components if fewer
      while (components.length < 3) {
        components.push(new Array(dim).fill(0));
      }

      return centered.map(row => components.map(comp => dot(row, comp)));
    }

    // --- k-NN Edge Builder ---

    function knnEdges(distMatrix, k) {
      const n = distMatrix.length;
      const edgeSet = new Set();

      for (let i = 0; i < n; i++) {
        const neighbors = Array.from({ length: n }, (_, j) => j)
          .filter(j => j !== i)
          .sort((a, b) => distMatrix[i][a] - distMatrix[i][b])
          .slice(0, k);

        for (const j of neighbors) {
          const edge = i < j ? `${i},${j}` : `${j},${i}`;
          edgeSet.add(edge);
        }
      }

      return Array.from(edgeSet).map(e => {
        const [a, b] = e.split(',').map(Number);
        return [a, b];
      }).sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    }

    // ═══════════════════════════════════════════════
    // Layout Computation — Centralized, Decentralized, Distributed
    // ═══════════════════════════════════════════════

    function fibonacciSphere(n) {
      const points = [];
      const goldenRatio = (1 + Math.sqrt(5)) / 2;
      for (let i = 0; i < n; i++) {
        const theta = Math.acos(1 - 2 * (i + 0.5) / n);
        const phi = 2 * Math.PI * i / goldenRatio;
        points.push([
          Math.sin(theta) * Math.cos(phi),
          Math.sin(theta) * Math.sin(phi),
          Math.cos(theta),
        ]);
      }
      return points;
    }

    function computeCentralizedLayout(embeddings, pcaCoords) {
      const n = embeddings.length;
      const centroid = meanVec(embeddings);

      // Find medoid (closest to centroid)
      let medoidIdx = 0, bestDist = Infinity;
      for (let i = 0; i < n; i++) {
        const d = cosineDistance(embeddings[i], centroid);
        if (d < bestDist) { bestDist = d; medoidIdx = i; }
      }

      // Spherical layout: PCA angles, cosine distance for radius
      const centerPca = pcaCoords[medoidIdx];
      const relative = pcaCoords.map(p => subtractVec(p, centerPca));

      const rPca = relative.map(r => Math.sqrt(r[0]**2 + r[1]**2 + r[2]**2) + 1e-9);
      const theta = relative.map((r, i) => Math.acos(Math.max(-1, Math.min(1, r[2] / rPca[i]))));
      const phi = relative.map(r => Math.atan2(r[1], r[0]));

      const distsFromMedoid = embeddings.map(e => cosineDistance(e, embeddings[medoidIdx]));
      const maxDist = Math.max(...distsFromMedoid) + 1e-9;
      const radii = distsFromMedoid.map(d => d / maxDist);

      const x = radii.map((r, i) => r * Math.sin(theta[i]) * Math.cos(phi[i]));
      const y = radii.map((r, i) => r * Math.sin(theta[i]) * Math.sin(phi[i]));
      const z = radii.map((r, i) => r * Math.cos(theta[i]));

      return {
        x: normalizeRange(x),
        y: normalizeRange(y),
        z: normalizeRange(z),
        medoidIdx,
      };
    }

    function computeDecentralizedLayout(embeddings, clusterLabels, k) {
      const n = embeddings.length;
      const hubPositions = fibonacciSphere(k).map(p => scaleVec(p, 0.6));
      const orbitRadius = 0.25;

      const x = new Array(n).fill(0);
      const y = new Array(n).fill(0);
      const z = new Array(n).fill(0);

      for (let c = 0; c < k; c++) {
        const indices = [];
        for (let i = 0; i < n; i++) {
          if (clusterLabels[i] === c) indices.push(i);
        }
        const nInCluster = indices.length;

        if (nInCluster === 0) continue;
        if (nInCluster === 1) {
          x[indices[0]] = hubPositions[c][0];
          y[indices[0]] = hubPositions[c][1];
          z[indices[0]] = hubPositions[c][2];
        } else if (nInCluster === 2) {
          const offset = orbitRadius * 0.3;
          x[indices[0]] = hubPositions[c][0] - offset;
          y[indices[0]] = hubPositions[c][1];
          z[indices[0]] = hubPositions[c][2];
          x[indices[1]] = hubPositions[c][0] + offset;
          y[indices[1]] = hubPositions[c][1];
          z[indices[1]] = hubPositions[c][2];
        } else {
          const clusterEmbeddings = indices.map(i => embeddings[i]);
          const localCoords = pca3d(clusterEmbeddings);
          const localMax = Math.max(...localCoords.flat().map(Math.abs)) + 1e-9;

          indices.forEach((idx, j) => {
            x[idx] = hubPositions[c][0] + (localCoords[j][0] / localMax) * orbitRadius;
            y[idx] = hubPositions[c][1] + (localCoords[j][1] / localMax) * orbitRadius;
            z[idx] = hubPositions[c][2] + (localCoords[j][2] / localMax) * orbitRadius;
          });
        }
      }

      return { x: normalizeRange(x), y: normalizeRange(y), z: normalizeRange(z) };
    }

    function computeDistributedLayout(embeddings, kNeighbors) {
      const umap = new UMAP({
        nComponents: 3,
        nNeighbors: Math.min(kNeighbors, embeddings.length - 1),
        minDist: 0.1,
        distanceFn: cosineDistance,
      });

      const coords = umap.fit(embeddings);

      return {
        x: normalizeRange(coords.map(c => c[0])),
        y: normalizeRange(coords.map(c => c[1])),
        z: normalizeRange(coords.map(c => c[2])),
      };
    }

    // ═══════════════════════════════════════════════

    async function nominateCenter(notes, apiKey) {
      const summaries = notes.map(n => `[${n.id}] ${n.text.slice(0, 150)}`).join('\n');

      const prompt = `I have a collection of personal notes. I want to find the ONE core idea that all others secretly orbit around — the gravitational center.

Here are all the notes:
${summaries}

Which ONE note (by its [id]) is the core idea that all others connect back to? Respond with:
- The note id (just the number)
- A 1-2 sentence explanation of why this is the center

Format:
CENTER: <id>
REASON: <explanation>`;

      const response = await generateContent(prompt, apiKey);
      const match = response.match(/CENTER:\s*(\d+)/);
      return match ? parseInt(match[1]) : 0;
    }

    async function nameClusters(notes, clusterLabels, k, apiKey) {
      let clusterInfo = '';
      for (let c = 0; c < k; c++) {
        const indices = clusterLabels.map((l, i) => l === c ? i : -1).filter(i => i >= 0);
        const clusterNotes = indices.map(i => `  [${notes[i].id}] ${notes[i].text.slice(0, 100)}`).join('\n');
        clusterInfo += `\nCLUSTER ${c} (${indices.length} notes):\n${clusterNotes}\n`;
      }

      const prompt = `I've clustered a collection of personal notes into ${k} groups. Name each cluster.

${clusterInfo}

For each cluster, give it a short name (2-4 words) that captures its theme.

Format:
CLUSTER 0: <name>
CLUSTER 1: <name>
...`;

      const response = await generateContent(prompt, apiKey);
      const names = {};
      for (const match of response.matchAll(/CLUSTER\s+(\d+):\s*(.+)/g)) {
        names[parseInt(match[1])] = match[2].trim().replace(/\*\*/g, '');
      }
      for (let c = 0; c < k; c++) {
        if (!names[c]) names[c] = `Cluster ${c}`;
      }
      return names;
    }

    const EDGE_LABEL_BATCH = 20;

    async function labelEdges(notes, edges, apiKey, onProgress) {
      const labeled = [];

      for (let i = 0; i < edges.length; i += EDGE_LABEL_BATCH) {
        const batch = edges.slice(i, i + EDGE_LABEL_BATCH);

        let pairsText = '';
        batch.forEach(([a, b], idx) => {
          pairsText += `\nPAIR ${idx}:\n  A [${a}]: ${notes[a].text.slice(0, 200)}\n  B [${b}]: ${notes[b].text.slice(0, 200)}\n`;
        });

        const prompt = `I have pairs of personal notes that are neighbors in an idea network. For each pair, describe the specific relationship in BOTH directions using short, actionable verb phrases (2-5 words).

Be specific and contextual — NOT generic labels like "relates to" or "is similar to". Think about HOW they connect:
- Does one inspire the other? ("could spark", "seeds the idea of")
- Is one a premise for the other? ("grounds", "is the foundation for")
- Do they contradict? ("tensions with", "challenges")
- Does one extend the other? ("builds on", "takes further")
- Does one reframe the other? ("reframes", "is the same thing seen from")

${pairsText}

Format (one line per pair):
PAIR 0: A→B: <verb phrase> | B→A: <verb phrase>
PAIR 1: A→B: <verb phrase> | B→A: <verb phrase>
...`;

        const response = await generateContent(prompt, apiKey);

        batch.forEach(([a, b], idx) => {
          const pattern = new RegExp(`PAIR\\s+${idx}:.*?A→B:\\s*(.+?)\\s*\\|\\s*B→A:\\s*(.+?)\\s*$`, 'm');
          const match = response.match(pattern);
          const fwd = match ? match[1].trim().replace(/\.$/, '') : 'connects to';
          const bwd = match ? match[2].trim().replace(/\.$/, '') : 'connects to';
          labeled.push({ source: a, target: b, label_forward: fwd, label_backward: bwd, topology: 'distrib' });
        });

        if (onProgress) onProgress(Math.min(i + EDGE_LABEL_BATCH, edges.length), edges.length);
      }

      return labeled;
    }

    function wrapNodeLabel(name) {
      const words = (name || '').split(/\s+/).slice(0, 4);
      if (!words.length) return [];
      const maxChars = 12;
      const lines = [];
      let current = '';
      for (const word of words) {
        if (current && (current.length + 1 + word.length) > maxChars) {
          lines.push(current);
          current = word;
        } else {
          current = current ? current + ' ' + word : word;
        }
      }
      if (current) lines.push(current);
      return lines;
    }

    function createNodeObject(node) {
      const color = CLUSTER_COLORS[node.cluster_id % CLUSTER_COLORS.length];
      const isSpecial = node.is_medoid || node.is_llm_center;
      const baseScale = isSpecial ? VFX.nodeScaleSpecial.val : VFX.nodeScale.val;

      // Invisible hit-target sprite for raycasting
      const hitMat = new THREE.SpriteMaterial({
        transparent: true,
        opacity: 0,
        depthWrite: false,
      });
      const hitSprite = new THREE.Sprite(hitMat);
      hitSprite.scale.set(baseScale, baseScale, 1);

      const group = new THREE.Group();
      group.add(hitSprite);

      // CSS2D label — constant screen-space size regardless of zoom
      const lines = wrapNodeLabel(node.name);
      if (lines.length) {
        const div = document.createElement('div');
        div.className = 'node-label' + (isSpecial ? ' node-label--special' : '');
        div.style.color = VFX.labelColor.val;
        div.style.opacity = String(VFX.labelAlpha.val);
        let html = `<span class="nl-bullet" style="color:${color};opacity:${VFX.clusterAlpha.val}">\u25A0</span><span class="nl-text"> ${lines[0]}`;
        for (let i = 1; i < lines.length; i++) html += `<br>${lines[i]}`;
        html += '</span>';
        div.innerHTML = html;
        const labelObj = new CSS2DObject(div);
        group.add(labelObj);
        node.__labelDiv = div;
      }

      node.__baseScale = baseScale;
      return group;
    }

    // Returns {neighbors1: Set<id>, neighbors2: Set<id>} for a focus node
    function getNeighborDepths(focusNode) {
      const neighbors1 = neighborSets[focusNode.id] || new Set();
      const neighbors2 = new Set();
      neighbors1.forEach(id => {
        (neighborSets[id] || new Set()).forEach(id2 => {
          if (id2 !== focusNode.id && !neighbors1.has(id2)) neighbors2.add(id2);

      });
      return { neighbors1, neighbors2 };
